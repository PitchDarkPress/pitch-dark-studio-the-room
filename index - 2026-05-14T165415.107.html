<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pitch Dark Studios — Gothic Studio V6</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Georgia,serif;
}

canvas{display:block}

#overlay{
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at center, transparent 55%, rgba(0,0,0,.45) 100%),
linear-gradient(to bottom, rgba(0,0,0,.06), rgba(0,0,0,.42));
z-index:5;
}

#ui{
position:fixed;
left:28px;
bottom:24px;
color:#d0a060;
font-size:12px;
letter-spacing:2px;
line-height:1.8;
opacity:.72;
z-index:10;
}
</style>
</head>

<body>

<div id="ui">
↑ — FORWARD<br>
↓ — BACKWARD<br>
← — LOOK LEFT<br>
→ — LOOK RIGHT
</div>

<div id="overlay"></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x070605,0.0026);

const camera = new THREE.PerspectiveCamera(
58,
window.innerWidth/window.innerHeight,
0.1,
2000
);

camera.position.set(0,4.5,28);

const renderer = new THREE.WebGLRenderer({
antialias:true,
powerPreference:'high-performance'
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

document.body.appendChild(renderer.domElement);

const room = new THREE.Group();
scene.add(room);

const woodDark = new THREE.MeshStandardMaterial({
color:0x24150d,
roughness:.88
});

const woodMid = new THREE.MeshStandardMaterial({
color:0x3a2417,
roughness:.82
});

const wallMat = new THREE.MeshStandardMaterial({
color:0x16100d,
roughness:1
});

function box(w,h,d,x,y,z,mat=woodDark,ry=0){
const mesh = new THREE.Mesh(
new THREE.BoxGeometry(w,h,d),
mat
);
mesh.position.set(x,y,z);
mesh.rotation.y = ry;
mesh.castShadow = true;
mesh.receiveShadow = true;
room.add(mesh);
return mesh;
}

const floor = new THREE.Mesh(
new THREE.PlaneGeometry(120,120),
new THREE.MeshStandardMaterial({
color:0x3b2518,
roughness:.92
})
);

floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
room.add(floor);

for(let x=-58;x<=58;x+=2){
box(.06,.03,120,x,.02,0,new THREE.MeshBasicMaterial({color:0x1b120d}));
}

box(120,42,1,0,21,-60,wallMat);
box(120,42,1,0,21,60,wallMat);
box(1,42,120,-60,21,0,wallMat);
box(1,42,120,60,21,0,wallMat);

const ceiling = new THREE.Mesh(
new THREE.PlaneGeometry(120,120),
new THREE.MeshStandardMaterial({
color:0x090807,
roughness:1
})
);

ceiling.rotation.x = Math.PI/2;
ceiling.position.y = 42;
room.add(ceiling);

box(22,30,.8,0,18,-59.4,new THREE.MeshStandardMaterial({
color:0x0d0f12,
roughness:.4
}));

const glass = new THREE.Mesh(
new THREE.PlaneGeometry(18,26),
new THREE.MeshBasicMaterial({
color:0x8fa6b8,
transparent:true,
opacity:.24
})
);

glass.position.set(0,18,-58.8);
room.add(glass);

for(let x=-7;x<=7;x+=3.5){
box(.14,28,.12,x,18,-58.6,new THREE.MeshBasicMaterial({color:0x111}));
}

for(let y=7;y<=29;y+=4.5){
box(18,.15,.12,0,y,-58.6,new THREE.MeshBasicMaterial({color:0x111}));
}

for(let i=0;i<160;i++){
const rain = new THREE.Mesh(
new THREE.PlaneGeometry(.03,.8),
new THREE.MeshBasicMaterial({
color:0xb7cbe0,
transparent:true,
opacity:.16
})
);

rain.position.set(
-9+Math.random()*18,
6+Math.random()*24,
-58.4
);

room.add(rain);
}

function createShelfColumn(x,z,rot=0){
const group = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(9,34,1.8),
woodDark
);

body.position.y = 17;
group.add(body);

for(let y=2;y<33;y+=3.1){
const shelf = new THREE.Mesh(
new THREE.BoxGeometry(9.2,.18,1.95),
new THREE.MeshStandardMaterial({
color:0x1b100a,
roughness:.9
})
);

shelf.position.y = y;
group.add(shelf);
}

for(let i=0;i<320;i++){
const book = new THREE.Mesh(
new THREE.BoxGeometry(
.25,
1.2+Math.random()*1.4,
.95
),
new THREE.MeshStandardMaterial({
color:new THREE.Color().setHSL(
.05+Math.random()*.05,
.45,
.18+Math.random()*.2
),
roughness:.88
})
);

book.position.set(
-3.8+Math.random()*7.6,
1.2+Math.floor(i/28)*3.1,
0
);

book.rotation.z = (Math.random()-.5)*.05;

group.add(book);
}

const railLeft = new THREE.Mesh(
new THREE.BoxGeometry(.12,34,.12),
new THREE.MeshStandardMaterial({color:0x555555})
);
railLeft.position.set(-4.7,17,.8);
group.add(railLeft);

const railRight = new THREE.Mesh(
new THREE.BoxGeometry(.12,34,.12),
new THREE.MeshStandardMaterial({color:0x555555})
);
railRight.position.set(4.7,17,.8);
group.add(railRight);

group.position.set(x,0,z);
group.rotation.y = rot;
room.add(group);
}

for(let z=-42;z<=42;z+=12){
createShelfColumn(-56,z,Math.PI/2);
createShelfColumn(56,z,-Math.PI/2);
}

for(let x=-34;x<=34;x+=12){
createShelfColumn(x,-56,0);
}

box(18,1.4,9,0,.7,14,woodMid);

box(3.5,5,4,-6,2.5,14,woodDark);
box(3.5,5,4,6,2.5,14,woodDark);

box(3,3,3,0,1.5,23,new THREE.MeshStandardMaterial({
color:0x1f130d,
roughness:.95
}),.25);

box(3,.8,2.2,0,1.7,14,new THREE.MeshStandardMaterial({
color:0x111111,
roughness:.7
}));

for(let i=0;i<12;i++){
box(
1+Math.random()*1.2,
.12+.2*Math.random(),
1+Math.random()*1.2,
-7+Math.random()*14,
1.5+Math.random()*.6,
10+Math.random()*8,
new THREE.MeshStandardMaterial({
color:0xcbb89a,
roughness:1
})
);
}

const rug = new THREE.Mesh(
new THREE.PlaneGeometry(28,18),
new THREE.MeshStandardMaterial({
color:0x3c1f1b,
roughness:1
})
);

rug.rotation.x = -Math.PI/2;
rug.position.y = .01;
rug.position.z = 16;
room.add(rug);

function sideDesk(x,z){
box(10,1.1,4,x,.55,z,woodMid);

for(let i=0;i<5;i++){
box(
1.2,
.8+Math.random()*1,
1,
x-3+Math.random()*6,
1.5,
z-1+Math.random()*2,
new THREE.MeshStandardMaterial({
color:0x222222,
roughness:.8
})
);
}
}

sideDesk(-42,4);
sideDesk(42,6);
sideDesk(-42,26);
sideDesk(42,28);

const board = new THREE.Mesh(
new THREE.PlaneGeometry(20,16),
new THREE.MeshStandardMaterial({
color:0x1c140f,
roughness:1
})
);

board.position.set(-50,18,0);
board.rotation.y = Math.PI/2;
room.add(board);

for(let i=0;i<80;i++){
const note = new THREE.Mesh(
new THREE.PlaneGeometry(
.8+Math.random()*1.4,
.8+Math.random()*1.2
),
new THREE.MeshBasicMaterial({
color:0xd8c3a2
})
);

note.position.set(
-49.4,
10+Math.random()*14,
-7+Math.random()*14
);

note.rotation.y = Math.PI/2;
note.rotation.z = (Math.random()-.5)*.4;
room.add(note);
}

scene.add(new THREE.AmbientLight(0x6d4f33,.42));

const moon = new THREE.SpotLight(
0xc3dcff,
120,
260,
.48,
.45,
1
);

moon.position.set(0,36,-30);
moon.target.position.set(0,8,0);
scene.add(moon.target);
scene.add(moon);

function deskLamp(x,y,z){
const light = new THREE.PointLight(
0xffc27a,
55,
70,
1.5
);

light.position.set(x,y,z);
light.castShadow = true;
room.add(light);

const glow = new THREE.Mesh(
new THREE.SphereGeometry(.22,16,16),
new THREE.MeshBasicMaterial({
color:0xffd39f
})
);

glow.position.copy(light.position);
room.add(glow);
}

deskLamp(0,5,14);
deskLamp(-42,4,4);
deskLamp(42,4,6);
deskLamp(-42,4,26);
deskLamp(42,4,28);

const dustGeo = new THREE.BufferGeometry();
const dustCount = 2400;
const positions = new Float32Array(dustCount*3);

for(let i=0;i<dustCount*3;i++){
positions[i] = (Math.random()-.5)*120;
}

dustGeo.setAttribute('position',new THREE.BufferAttribute(positions,3));

const dust = new THREE.Points(
dustGeo,
new THREE.PointsMaterial({
color:0xffddb0,
size:.045,
transparent:true,
opacity:.18
})
);

scene.add(dust);

let yaw = 0;
const keys = {};

window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

function move(){
const speed = .11;

const forward = new THREE.Vector3(
Math.sin(yaw),
0,
Math.cos(yaw)
);

if(keys['ArrowUp']){
camera.position.add(
forward.clone().multiplyScalar(-speed)
);
}

if(keys['ArrowDown']){
camera.position.add(
forward.clone().multiplyScalar(speed)
);
}

if(keys['ArrowLeft']) yaw += .02;
if(keys['ArrowRight']) yaw -= .02;

camera.position.x = Math.max(-54,Math.min(54,camera.position.x));
camera.position.z = Math.max(-54,Math.min(54,camera.position.z));

camera.position.y = 4.5;

camera.rotation.order='YXZ';
camera.rotation.y = yaw;
camera.rotation.x = 0;
}

function animate(){
requestAnimationFrame(animate);

move();

dust.rotation.y += .00003;

renderer.render(scene,camera);
}

animate();

window.addEventListener('resize',()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
