<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch Dark Studios — V9 Humanised Room</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Georgia,serif;
}
canvas{display:block}
#overlay{
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at center, transparent 62%, rgba(0,0,0,.48) 100%),
linear-gradient(to bottom, rgba(0,0,0,.02), rgba(0,0,0,.42));
z-index:5;
}
#ui{
position:fixed;
left:28px;
bottom:24px;
color:#d0a060;
font-size:12px;
letter-spacing:2px;
line-height:1.8;
opacity:.72;
z-index:10;
}
</style>
</head>

<body>

<div id="ui">
↑ — FORWARD<br>
↓ — BACKWARD<br>
← — LOOK LEFT<br>
→ — LOOK RIGHT
</div>

<div id="overlay"></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x060504,0.0018);

const camera = new THREE.PerspectiveCamera(
55,
window.innerWidth/window.innerHeight,
0.1,
2000
);

camera.position.set(-6,5.2,44);

const renderer = new THREE.WebGLRenderer({
antialias:true,
powerPreference:'high-performance'
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

document.body.appendChild(renderer.domElement);

const room = new THREE.Group();
scene.add(room);

const wallMat = new THREE.MeshStandardMaterial({color:0x130d0a,roughness:1});
const floorMat = new THREE.MeshStandardMaterial({color:0x3b2518,roughness:.92});
const woodDark = new THREE.MeshStandardMaterial({color:0x1f120c,roughness:.9});
const woodMid = new THREE.MeshStandardMaterial({color:0x4a2c1b,roughness:.82});
const paperMat = new THREE.MeshStandardMaterial({color:0xd7c5a8,roughness:1});
const blackMat = new THREE.MeshStandardMaterial({color:0x0c0c0c,roughness:.8});

function box(w,h,d,x,y,z,mat=woodDark,ry=0){
const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
mesh.position.set(x,y,z);
mesh.rotation.y = ry;
mesh.castShadow = true;
mesh.receiveShadow = true;
room.add(mesh);
return mesh;
}

// ROOM
const floor = new THREE.Mesh(
new THREE.PlaneGeometry(120,120),
floorMat
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
room.add(floor);

for(let x=-58;x<=58;x+=2){
box(.04,.02,120,x,.01,0,new THREE.MeshBasicMaterial({color:0x1a110c}));
}

box(120,46,1,0,23,-60,wallMat);
box(120,46,1,0,23,60,wallMat);
box(1,46,120,-60,23,0,wallMat);
box(1,46,120,60,23,0,wallMat);

const ceiling = new THREE.Mesh(
new THREE.PlaneGeometry(120,120),
new THREE.MeshStandardMaterial({color:0x070605,roughness:1})
);
ceiling.rotation.x = Math.PI/2;
ceiling.position.y = 46;
room.add(ceiling);

// WINDOW
const glass = new THREE.Mesh(
new THREE.PlaneGeometry(28,38),
new THREE.MeshBasicMaterial({
color:0xb8d1e6,
transparent:true,
opacity:.42
})
);
glass.position.set(0,24,-59.15);
room.add(glass);

box(32,2,.8,0,5,-58.9,blackMat);
box(32,2,.8,0,43,-58.9,blackMat);
box(2,38,.8,-16,24,-58.9,blackMat);
box(2,38,.8,16,24,-58.9,blackMat);

for(let x=-12;x<=12;x+=6){
box(.22,38,.4,x,24,-58.7,blackMat);
}

for(let y=10;y<=38;y+=7){
box(30,.22,.4,0,y,-58.7,blackMat);
}

// rain
for(let i=0;i<300;i++){
const rain = new THREE.Mesh(
new THREE.PlaneGeometry(.03,1.4),
new THREE.MeshBasicMaterial({
color:0xe2f0ff,
transparent:true,
opacity:.18
})
);
rain.position.set(
-13+Math.random()*26,
8+Math.random()*34,
-58.2
);
rain.rotation.z = -.12;
room.add(rain);
}

// SHELVES
function shelf(x,z,rot=0,height=38){
const group = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(10,height,2),
woodDark
);

body.position.y = height/2;
group.add(body);

for(let y=2;y<height-1;y+=3.1){
const shelf = new THREE.Mesh(
new THREE.BoxGeometry(10.2,.16,2.1),
new THREE.MeshStandardMaterial({color:0x160d08,roughness:.95})
);
shelf.position.y = y;
group.add(shelf);
}

for(let i=0;i<420;i++){
const book = new THREE.Mesh(
new THREE.BoxGeometry(
.28,
1.2+Math.random()*1.6,
1.05
),
new THREE.MeshStandardMaterial({
color:new THREE.Color().setHSL(
.04+Math.random()*.06,
.5,
.16+Math.random()*.22
),
roughness:.88
})
);

book.position.set(
-4.1+Math.random()*8.2,
1.4+Math.floor(i/30)*3.1,
0
);

book.rotation.z = (Math.random()-.5)*.08;
group.add(book);
}

// gaps
for(let i=0;i<12;i++){
const gap = new THREE.Mesh(
new THREE.BoxGeometry(1.4,2.2,1.2),
new THREE.MeshBasicMaterial({transparent:true,opacity:0})
);
gap.position.set(
-3+Math.random()*6,
2+Math.random()*30,
0
);
group.add(gap);
}

group.position.set(x,0,z);
group.rotation.y = rot;
room.add(group);
}

for(let z=-42;z<=42;z+=12){
shelf(-56,z+(Math.random()-.5)*2,Math.PI/2,36+Math.random()*3);
shelf(56,z+(Math.random()-.5)*2,-Math.PI/2,36+Math.random()*3);
}

for(let x=-36;x<=36;x+=12){
shelf(x+(Math.random()-.5)*2,-56,0,36+Math.random()*3);
}

// LADDER
box(.25,26,.25,-48,13,-10,new THREE.MeshStandardMaterial({color:0x6f5a32}));
box(.25,26,.25,-45.8,13,-10,new THREE.MeshStandardMaterial({color:0x6f5a32}));

for(let y=3;y<24;y+=2){
box(2.2,.12,.18,-46.9,y,-10,new THREE.MeshStandardMaterial({color:0x7b6337}));
}

// RUG
const rug = new THREE.Mesh(
new THREE.PlaneGeometry(40,28),
new THREE.MeshStandardMaterial({
color:0x3b1817,
roughness:1
})
);
rug.rotation.x = -Math.PI/2;
rug.position.y = .01;
rug.position.z = 18;
room.add(rug);

// DESK
box(26,1.8,13,-1,.9,16,woodMid,.02);

box(5,6,5,-10,3,16,woodDark);
box(5,6,5,8,3,16,woodDark);

box(4.2,3.4,4.2,2,1.7,27,woodDark,.3);
box(4,5,.5,2,4.5,28.6,woodDark,.3);

// typewriter
box(4.4,1.1,3,-1,2.2,14,blackMat);
box(3.2,.12,1.6,-1,2.9,12.7,paperMat);

// PAPER CHAOS
for(let i=0;i<80;i++){
box(
1+Math.random()*2.6,
.05+.08*Math.random(),
1+Math.random()*2.2,
-13+Math.random()*22,
2+Math.random()*.7,
10+Math.random()*12,
paperMat,
(Math.random()-.5)*1.2
);
}

// BOOK PILES
function pile(x,z,count=8){
for(let i=0;i<count;i++){
box(
2+Math.random()*1,
.22,
1.4+Math.random()*.5,
x+(Math.random()-.5)*.8,
.15+i*.23,
z+(Math.random()-.5)*.8,
new THREE.MeshStandardMaterial({
color:new THREE.Color().setHSL(.05+Math.random()*.05,.48,.18+Math.random()*.16),
roughness:.9
}),
(Math.random()-.5)*.4
);
}
}

pile(-15,10,12);
pile(15,12,10);
pile(-18,28,14);
pile(16,31,11);
pile(-6,18,6);
pile(8,14,7);

// FLOOR CLUTTER
for(let i=0;i<22;i++){
box(
1+Math.random()*1.4,
.05,
1+Math.random()*1.4,
-24+Math.random()*48,
.03,
5+Math.random()*40,
paperMat,
(Math.random()-.5)*1.2
);
}

// INVESTIGATION WALL
const board = new THREE.Mesh(
new THREE.PlaneGeometry(30,22),
new THREE.MeshStandardMaterial({
color:0x21160f,
roughness:1
})
);
board.position.set(-58.7,22,2);
board.rotation.y = Math.PI/2;
room.add(board);

for(let i=0;i<140;i++){
const note = new THREE.Mesh(
new THREE.PlaneGeometry(
.7+Math.random()*1.8,
.6+Math.random()*1.6
),
new THREE.MeshBasicMaterial({
color:Math.random()>.82 ? 0x9a6944 : 0xdac6a8
})
);

note.position.set(
-58.15,
11+Math.random()*20,
-12+Math.random()*24
);

note.rotation.y = Math.PI/2;
note.rotation.z = (Math.random()-.5)*.7;
room.add(note);
}

// FRAMES
for(let i=0;i<12;i++){
box(
3+Math.random()*3,
2+Math.random()*2,
.2,
-58.3,
14+Math.random()*22,
-18+Math.random()*36,
new THREE.MeshStandardMaterial({color:0x2a1b12,roughness:.9}),
Math.PI/2
);
}

// BROADCAST STACKS
for(let i=0;i<6;i++){
box(4,3.2,3,49,1.6+i*3.3,-8,blackMat);
box(2.8,.12,.18,49,2+i*3.3,-6.45,new THREE.MeshBasicMaterial({color:0xff6a2a}));
}

// SIDE DESKS
function sideDesk(x,z,rot=0){
box(12,1.2,4.5,x,.6,z,woodMid,rot);

for(let i=0;i<10;i++){
box(
1.2,
.7+Math.random()*1.2,
1,
x-4+Math.random()*8,
1.5,
z-1.5+Math.random()*3,
new THREE.MeshStandardMaterial({
color:0x222222,
roughness:.8
})
);
}
}

sideDesk(-43,10,.02);
sideDesk(43,12,-.02);
sideDesk(-43,34,.03);
sideDesk(43,36,-.03);

// LIGHTS
scene.add(new THREE.AmbientLight(0x86623d,.52));

const moon = new THREE.SpotLight(
0xd6ebff,
210,
320,
.55,
.45,
1
);

moon.position.set(0,43,-36);
moon.target.position.set(0,8,6);
scene.add(moon.target);
scene.add(moon);

function lamp(x,y,z,intensity=70,dist=90){
const light = new THREE.PointLight(
0xffc27a,
intensity,
dist,
1.4
);

light.position.set(x,y,z);
light.castShadow = true;
room.add(light);

const glow = new THREE.Mesh(
new THREE.SphereGeometry(.32,20,20),
new THREE.MeshBasicMaterial({color:0xffd39f})
);

glow.position.copy(light.position);
room.add(glow);
}

lamp(-1,6.8,16,120,110);
lamp(-43,5,10,58,70);
lamp(43,5,12,44,60);
lamp(-43,5,34,42,65);
lamp(43,5,36,60,75);

// extra isolated lamps
lamp(-25,3,44,26,38);
lamp(24,3,46,18,30);

// DUST
const dustGeo = new THREE.BufferGeometry();
const dustCount = 3400;
const positions = new Float32Array(dustCount*3);

for(let i=0;i<dustCount*3;i++){
positions[i]=(Math.random()-.5)*120;
}

dustGeo.setAttribute('position',new THREE.BufferAttribute(positions,3));

const dust = new THREE.Points(
dustGeo,
new THREE.PointsMaterial({
color:0xffddb0,
size:.05,
transparent:true,
opacity:.18
})
);

scene.add(dust);

// MOVEMENT
let yaw = .06;
const keys = {};

window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

function move(){

const speed = .18;

const forward = new THREE.Vector3(
Math.sin(yaw),
0,
Math.cos(yaw)
);

if(keys['ArrowUp']){
camera.position.add(forward.clone().multiplyScalar(-speed));
}

if(keys['ArrowDown']){
camera.position.add(forward.clone().multiplyScalar(speed));
}

if(keys['ArrowLeft']) yaw += .022;
if(keys['ArrowRight']) yaw -= .022;

camera.position.x = Math.max(-54,Math.min(54,camera.position.x));
camera.position.z = Math.max(-54,Math.min(54,camera.position.z));

camera.position.y = 5.2;

camera.rotation.order='YXZ';
camera.rotation.y = yaw;
camera.rotation.x = 0;
}

function animate(){
requestAnimationFrame(animate);

move();

dust.rotation.y += .00004;

renderer.render(scene,camera);
}

animate();

window.addEventListener('resize',()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
