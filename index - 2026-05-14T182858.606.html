<!DOCTYPE html>
<html lang="en">
<head>

<title>Pitch Dark Studios — Texture Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Georgia,serif}
#room{
