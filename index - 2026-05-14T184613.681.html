<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch Dark Studios — V16 Room Rebuild</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Georgia,serif;
}

canvas{display:block}

#ui{
position:fixed;
left:28px;
bottom:24px;
color:#c8924b;
font-size:12px;
letter-spacing:2px;
line-height:1.8;
opacity:.8;
z-index:20;
text-shadow:0 0 12px #000;
}

#version{
position:fixed;
top:22px;
left:50%;
transform:translateX(-50%);
color:#8f6438;
letter-spacing:6px;
font-size:11px;
opacity:.45;
z-index:20;
}

#overlay{
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at center, transparent 52%, rgba(0,0,0,.55) 100%),
linear-gradient(to bottom, rgba(0,0,0,.04), rgba(0,0,0,.40));
z-index:10;
}
</style>
</head>

<body>

<div id="version">PITCH DARK STUDIOS — V16 ROOM REBUILD</div>

<div id="ui">
↑ — FORWARD<br>
↓ — BACKWARD<br>
← — LOOK LEFT<br>
→ — LOOK RIGHT
</div>

<div id="overlay"></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020101);
scene.fog = new THREE.FogExp2(0x050302, 0.0017);

const camera = new THREE.PerspectiveCamera(
  58,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.set(0, 5.2, 36);

const renderer = new THREE.WebGLRenderer({
  antialias:true,
  powerPreference:'high-performance'
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

document.body.appendChild(renderer.domElement);

const room = new THREE.Group();
scene.add(room);

// -----------------------------------------------------
// PROCEDURAL TEXTURES
// -----------------------------------------------------

function makeWoodTexture(base="#3a2114", line="#160b06"){
  const c = document.createElement("canvas");
  c.width = 512;
  c.height = 512;
  const g = c.getContext("2d");
  g.fillStyle = base;
  g.fillRect(0,0,512,512);

  for(let y=0;y<512;y+=22){
    g.fillStyle = line;
    g.globalAlpha = .55;
    g.fillRect(0,y,512,2);
    g.globalAlpha = .18;
    g.fillRect(0,y+5,512,1);
  }

  for(let i=0;i<120;i++){
    g.strokeStyle = Math.random()>.5 ? "rgba(0,0,0,.18)" : "rgba(255,180,90,.08)";
    g.beginPath();
    const y = Math.random()*512;
    g.moveTo(0,y);
    g.bezierCurveTo(130,y+Math.random()*24-12,300,y+Math.random()*24-12,512,y+Math.random()*24-12);
    g.stroke();
  }

  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  t.wrapS = THREE.RepeatWrapping;
  t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(6,6);
  return t;
}

function makeWallTexture(){
  const c = document.createElement("canvas");
  c.width = 512;
  c.height = 512;
  const g = c.getContext("2d");
  g.fillStyle = "#130c08";
  g.fillRect(0,0,512,512);

  for(let i=0;i<900;i++){
    const v = 18 + Math.random()*32;
    g.fillStyle = `rgba(${v},${v*.7},${v*.45},${Math.random()*.18})`;
    g.fillRect(Math.random()*512, Math.random()*512, 1+Math.random()*3, 1+Math.random()*3);
  }

  for(let y=0;y<512;y+=96){
    g.strokeStyle = "rgba(0,0,0,.28)";
    g.lineWidth = 4;
    g.beginPath();
    g.moveTo(0,y);
    g.lineTo(512,y);
    g.stroke();
  }

  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  t.wrapS = THREE.RepeatWrapping;
  t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(3,3);
  return t;
}

const texFloor = makeWoodTexture("#3a2114","#140905");
const texDesk = makeWoodTexture("#4c2b18","#1a0d07");
const texWall = makeWallTexture();

const matFloor = new THREE.MeshStandardMaterial({ map: texFloor, roughness:.86 });
const matDesk = new THREE.MeshStandardMaterial({ map: texDesk, roughness:.82 });
const matWall = new THREE.MeshStandardMaterial({ map: texWall, roughness:1 });
const matDark = new THREE.MeshStandardMaterial({ color:0x090605, roughness:.95 });
const matBlack = new THREE.MeshStandardMaterial({ color:0x050505, roughness:.75 });
const matPaper = new THREE.MeshStandardMaterial({ color:0xd9c8aa, roughness:1 });
const matBrass = new THREE.MeshStandardMaterial({ color:0x9a7138, roughness:.42, metalness:.2 });

// -----------------------------------------------------
// HELPERS
// -----------------------------------------------------

function box(w,h,d,x,y,z,mat=matDark,ry=0){
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  mesh.position.set(x,y,z);
  mesh.rotation.y = ry;
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  room.add(mesh);
  return mesh;
}

function plane(w,h,x,y,z,mat,rx=0,ry=0,rz=0){
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat);
  mesh.position.set(x,y,z);
  mesh.rotation.set(rx,ry,rz);
  mesh.receiveShadow = true;
  room.add(mesh);
  return mesh;
}

// -----------------------------------------------------
// ROOM SHELL
// -----------------------------------------------------

const floor = new THREE.Mesh(new THREE.PlaneGeometry(120,120), matFloor);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
room.add(floor);

box(120,42,1,0,21,-60,matWall);
box(120,42,1,0,21,60,matWall);
box(1,42,120,-60,21,0,matWall);
box(1,42,120,60,21,0,matWall);

const ceiling = new THREE.Mesh(
  new THREE.PlaneGeometry(120,120),
  new THREE.MeshStandardMaterial({ color:0x050403, roughness:1 })
);
ceiling.rotation.x = Math.PI/2;
ceiling.position.y = 42;
room.add(ceiling);

// ceiling beams
for(let z=-48; z<=48; z+=12){
  box(120,.7,.8,0,41.5,z,new THREE.MeshStandardMaterial({color:0x0b0503,roughness:.95}));
}

// -----------------------------------------------------
// WINDOW WALL — MUCH CLEARER
// -----------------------------------------------------

const glassMat = new THREE.MeshBasicMaterial({
  color:0x9db8cc,
  transparent:true,
  opacity:.34
});

plane(28,34,0,24,-59.35,glassMat,0,0,0);

box(34,2,1,0,6,-58.9,matBlack);
box(34,2,1,0,42,-58.9,matBlack);
box(2,36,1,-17,24,-58.9,matBlack);
box(2,36,1,17,24,-58.9,matBlack);

for(let x=-12;x<=12;x+=6){
  box(.22,36,.5,x,24,-58.6,matBlack);
}
for(let y=10;y<=38;y+=7){
  box(32,.22,.5,0,y,-58.6,matBlack);
}

box(38,1.4,3,0,5.3,-57.6,matDark);

// rain streaks
for(let i=0;i<260;i++){
  const rain = plane(
    .035,
    1.4,
    -13+Math.random()*26,
    8+Math.random()*32,
    -58.15,
    new THREE.MeshBasicMaterial({
      color:0xd8edff,
      transparent:true,
      opacity:.18
    })
  );
  rain.rotation.z = -.12;
}

// -----------------------------------------------------
// SHELVES — DARK BUT DEEP
// -----------------------------------------------------

function shelfTower(x,z,rot=0,height=36){
  const g = new THREE.Group();

  const back = new THREE.Mesh(
    new THREE.BoxGeometry(10,height,2.2),
    new THREE.MeshStandardMaterial({ color:0x1a0e08, roughness:.9 })
  );
  back.position.y = height/2;
  g.add(back);

  for(let y=2;y<height-1;y+=3){
    const s = new THREE.Mesh(
      new THREE.BoxGeometry(10.3,.20,2.4),
      new THREE.MeshStandardMaterial({ color:0x0e0704, roughness:.95 })
    );
    s.position.y = y;
    g.add(s);
  }

  for(let i=0;i<330;i++){
    const book = new THREE.Mesh(
      new THREE.BoxGeometry(.25,1.1+Math.random()*1.4,1.05),
      new THREE.MeshStandardMaterial({
        color:new THREE.Color().setHSL(.05+Math.random()*.05,.50,.14+Math.random()*.20),
        roughness:.9
      })
    );
    book.position.set(
      -4.2+Math.random()*8.4,
      1.2+Math.floor(i/28)*3,
      .08
    );
    book.rotation.z = (Math.random()-.5)*.06;
    g.add(book);
  }

  // brass rails
  for(let r of [-5.15,5.15]){
    const rail = new THREE.Mesh(new THREE.BoxGeometry(.12,height,.12),matBrass);
    rail.position.set(r,height/2,1.28);
    g.add(rail);
  }

  g.position.set(x,0,z);
  g.rotation.y = rot;
  room.add(g);
}

for(let z=-42; z<=42; z+=12){
  shelfTower(-56,z,Math.PI/2,36);
  shelfTower(56,z,-Math.PI/2,36);
}
for(let x=-36; x<=36; x+=12){
  shelfTower(x,-56,0,36);
}

// rolling ladder
box(.22,27,.22,-48,13,-9,matBrass);
box(.22,27,.22,-45.7,13,-9,matBrass);
for(let y=3;y<25;y+=2.2){
  box(2.4,.12,.16,-46.85,y,-9,matBrass);
}

// -----------------------------------------------------
// DESK ZONE — STRONGER CENTRE
// -----------------------------------------------------

const rugMat = new THREE.MeshStandardMaterial({ color:0x351614, roughness:1 });
const rug = new THREE.Mesh(new THREE.PlaneGeometry(38,26),rugMat);
rug.rotation.x = -Math.PI/2;
rug.position.y = .015;
rug.position.z = 18;
room.add(rug);

box(28,2,14,0,1,16,matDesk);
box(6,6,5,-10,3,16,matDesk);
box(6,6,5,10,3,16,matDesk);
box(28,.35,.7,0,2.2,9.1,matDark);
box(28,.35,.7,0,2.2,22.9,matDark);
box(28,.08,.12,0,2.48,9.0,matBrass);
box(28,.08,.12,0,2.48,23.0,matBrass);

// chair
box(5,1.1,5,2,2.1,27,new THREE.MeshStandardMaterial({color:0x27140f,roughness:.88}),.25);
box(4.6,6,.7,2,5.3,29.2,new THREE.MeshStandardMaterial({color:0x1d0d08,roughness:.9}),.25);
box(.5,2.2,4.3,-.7,2.8,27.6,matDark,.25);
box(.5,2.2,4.3,4.7,2.8,26.3,matDark,.25);

// typewriter
box(5,1.2,3,0,2.4,13,matBlack);
box(3.4,.15,1.8,0,3.15,11.8,matPaper);
for(let i=0;i<12;i++){
  box(.18,.08,.18,-2.1+i*.38,3.05,14.1,new THREE.MeshBasicMaterial({color:0xd8cfbd}));
}

// desk papers
for(let i=0;i<55;i++){
  const tone = [0xd8c8aa,0xc7b798,0xe2d4b8,0xbfae91][Math.floor(Math.random()*4)];
  box(
    1+Math.random()*3,
    .055,
    1+Math.random()*2.2,
    -13+Math.random()*26,
    2.25+Math.random()*.3,
    10+Math.random()*11,
    new THREE.MeshStandardMaterial({ color:tone, roughness:1 }),
    (Math.random()-.5)*1.2
  );
}

// floor papers
for(let i=0;i<28;i++){
  box(
    1+Math.random()*2.6,
    .035,
    1+Math.random()*2,
    -32+Math.random()*64,
    .04,
    4+Math.random()*44,
    matPaper,
    (Math.random()-.5)*1.5
  );
}

// investigation board
const board = plane(
  28,
  20,
  -58.7,
  22,
  3,
  new THREE.MeshStandardMaterial({color:0x21140d,roughness:1}),
  0,
  Math.PI/2,
  0
);

for(let i=0;i<120;i++){
  const note = plane(
    .8+Math.random()*1.8,
    .7+Math.random()*1.4,
    -58.12,
    12+Math.random()*18,
    -8+Math.random()*22,
    new THREE.MeshBasicMaterial({
      color: Math.random()>.84 ? 0x9b6b43 : 0xd9c4a4
    }),
    0,
    Math.PI/2,
    (Math.random()-.5)*.7
  );
}

// book piles
function pile(x,z,count=8){
  for(let i=0;i<count;i++){
    box(
      2+Math.random()*1.2,
      .24,
      1.4+Math.random()*.6,
      x+(Math.random()-.5)*.7,
      .16+i*.25,
      z+(Math.random()-.5)*.7,
      new THREE.MeshStandardMaterial({
        color:new THREE.Color().setHSL(.05+Math.random()*.05,.45,.15+Math.random()*.18),
        roughness:.9
      }),
      (Math.random()-.5)*.4
    );
  }
}
pile(-16,10,10);
pile(16,12,8);
pile(-18,30,11);
pile(18,32,9);

// -----------------------------------------------------
// LIGHTING
// -----------------------------------------------------

scene.add(new THREE.AmbientLight(0x765435,.46));

const moon = new THREE.SpotLight(0xd6ebff,170,320,.55,.45,1);
moon.position.set(0,42,-36);
moon.target.position.set(0,8,4);
scene.add(moon.target);
scene.add(moon);

function lamp(x,y,z,intensity=80,dist=85){
  const light = new THREE.PointLight(0xffbf76,intensity,dist,1.4);
  light.position.set(x,y,z);
  light.castShadow = true;
  room.add(light);

  const bulb = new THREE.Mesh(
    new THREE.SphereGeometry(.32,18,18),
    new THREE.MeshBasicMaterial({color:0xffd4a0})
  );
  bulb.position.copy(light.position);
  room.add(bulb);
}

lamp(-6,6.5,12,110,95);
lamp(7,5,19,65,65);
lamp(-42,5,12,45,65);
lamp(42,5,14,45,65);
lamp(-42,5,36,35,55);
lamp(42,5,38,42,55);

// dust
const dustGeo = new THREE.BufferGeometry();
const dustCount = 3200;
const positions = new Float32Array(dustCount*3);
for(let i=0;i<dustCount*3;i++){
  positions[i]=(Math.random()-.5)*130;
}
dustGeo.setAttribute('position',new THREE.BufferAttribute(positions,3));

const dust = new THREE.Points(
  dustGeo,
  new THREE.PointsMaterial({
    color:0xffddb0,
    size:.05,
    transparent:true,
    opacity:.16
  })
);
scene.add(dust);

// -----------------------------------------------------
// MOVEMENT — LOCKED SPEED
// -----------------------------------------------------

let yaw = 0;
const keys = {};

window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

function move(){
  const speed = .32;
  const forward = new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));

  if(keys['ArrowUp']) camera.position.add(forward.clone().multiplyScalar(-speed));
  if(keys['ArrowDown']) camera.position.add(forward.clone().multiplyScalar(speed));
  if(keys['ArrowLeft']) yaw += .04;
  if(keys['ArrowRight']) yaw -= .04;

  camera.position.x = Math.max(-54,Math.min(54,camera.position.x));
  camera.position.z = Math.max(-54,Math.min(54,camera.position.z));
  camera.position.y = 5.2;

  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = 0;
}

function animate(){
  requestAnimationFrame(animate);
  move();
  dust.rotation.y += .000035;
  renderer.render(scene,camera);
}

animate();

window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
});
</script>
</body>
</html>
