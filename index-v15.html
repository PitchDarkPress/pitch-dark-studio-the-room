<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch Dark Studio — V15</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Georgia,serif;
}

canvas{
display:block;
}

#title{
position:fixed;
top:22px;
left:50%;
transform:translateX(-50%);
color:#444;
font-size:11px;
letter-spacing:5px;
opacity:.75;
z-index:20;
}

#ui{
position:fixed;
bottom:20px;
left:20px;
color:#666;
font-size:11px;
letter-spacing:2px;
line-height:1.8;
opacity:.75;
z-index:20;
}

#overlay{
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at center,
transparent 32%,
rgba(0,0,0,.42) 72%,
rgba(0,0,0,.82) 100%);
z-index:10;
}
</style>
</head>

<body>

<div id="title">PITCH DARK STUDIO — V15</div>

<div id="ui">
↑ ↓ MOVE<br>
← → LOOK
</div>

<div id="overlay"></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020202);
scene.fog = new THREE.FogExp2(0x000000,0.012);

const camera = new THREE.PerspectiveCamera(
58,
window.innerWidth/window.innerHeight,
0.1,
100
);

// HUMAN HEIGHT
camera.position.set(0,3.9,18);

const renderer = new THREE.WebGLRenderer({
antialias:true,
powerPreference:'high-performance'
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
renderer.outputColorSpace = THREE.SRGBColorSpace;

renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

document.body.appendChild(renderer.domElement);


// --------------------------------------------------
// SIMPLE PROCEDURAL TEXTURES
// --------------------------------------------------

function makeWoodTexture(base='#2a1d16', grain='#120d0a'){

const c = document.createElement('canvas');
c.width = 512;
c.height = 512;

const g = c.getContext('2d');

g.fillStyle = base;
g.fillRect(0,0,512,512);

for(let i=0;i<140;i++){

  g.strokeStyle = `rgba(0,0,0,${0.03 + Math.random()*.08})`;

  g.beginPath();

  const y = Math.random()*512;

  g.moveTo(0,y);

  g.bezierCurveTo(
    120,y + (Math.random()-.5)*20,
    320,y + (Math.random()-.5)*20,
    512,y + (Math.random()-.5)*20
  );

  g.stroke();
}

for(let i=0;i<300;i++){

  g.fillStyle = `rgba(255,180,120,${Math.random()*.03})`;

  g.fillRect(
    Math.random()*512,
    Math.random()*512,
    2,
    2
  );
}

const t = new THREE.CanvasTexture(c);
t.wrapS = THREE.RepeatWrapping;
t.wrapT = THREE.RepeatWrapping;
t.repeat.set(2,1);

return t;
}

const woodTexture = makeWoodTexture('#3a261c','#120904');

// --------------------------------------------------
// MATERIALS
// --------------------------------------------------

const blackMat = new THREE.MeshStandardMaterial({
color:0x0a0a0a,
roughness:1
});

const deskMat = new THREE.MeshStandardMaterial({
map:woodTexture,
color:0x4a3022,
roughness:.72,
metalness:.02
});

const chairMat = new THREE.MeshStandardMaterial({
map:woodTexture,
color:0x2a211d,
roughness:.82
});

const paperMat = new THREE.MeshStandardMaterial({
color:0x76614f,
roughness:1
});

const rugMat = new THREE.MeshStandardMaterial({
color:0x2d1a16,
roughness:1
});

const metalMat = new THREE.MeshStandardMaterial({
color:0x999999,
roughness:.55,
metalness:.5
});

// --------------------------------------------------
// FLOOR
// --------------------------------------------------

const floor = new THREE.Mesh(
new THREE.PlaneGeometry(220,220),
new THREE.MeshStandardMaterial({
color:0x050505,
roughness:1
})
);

floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// --------------------------------------------------
// RUG
// --------------------------------------------------

const rug = new THREE.Mesh(
new THREE.PlaneGeometry(2.1,1.45),
rugMat
);

rug.rotation.x = -Math.PI/2;
rug.position.y = .01;
rug.position.z = .7;
rug.receiveShadow = true;
scene.add(rug);

// --------------------------------------------------
// DESK
// --------------------------------------------------

const desk = new THREE.Group();
scene.add(desk);

function part(w,h,d,x,y,z,mat=deskMat){
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    mat
  );

  m.position.set(x,y,z);
  m.castShadow = true;
  m.receiveShadow = true;
  desk.add(m);

  return m;
}

part(7,.18,2.8,0,2.2,0);

part(.25,2.2,.25,-3.1,1.1,-1.1);
part(.25,2.2,.25,3.1,1.1,-1.1);
part(.25,2.2,.25,-3.1,1.1,1.1);
part(.25,2.2,.25,3.1,1.1,1.1);

part(1.2,2,2.4,-2.2,1,-.05);
part(1.2,2,2.4,2.2,1,-.05);

// --------------------------------------------------
// DRAWERS
// --------------------------------------------------

for(let side of [-2.2,2.2]){

  for(let y of [.55,1.1,1.65]){

    const handle = new THREE.Mesh(
      new THREE.BoxGeometry(.34,.04,.06),
      metalMat
    );

    handle.position.set(side,y,1.22);
    handle.castShadow = true;
    desk.add(handle);
  }
}

// --------------------------------------------------
// COMPUTER
// --------------------------------------------------

const computer = new THREE.Group();
scene.add(computer);

const monitor = new THREE.Mesh(
new THREE.BoxGeometry(1.45,1.3,1.08),
new THREE.MeshStandardMaterial({
color:0x090909,
roughness:1
})
);

monitor.position.set(0,3.0,0);
monitor.castShadow = true;
computer.add(monitor);

const screen = new THREE.Mesh(
new THREE.PlaneGeometry(.9,.7),
new THREE.MeshBasicMaterial({
color:0x010401
})
);

screen.position.set(0,3.03,.56);
computer.add(screen);



// --------------------------------------------------
// TERMINAL CANVAS
// --------------------------------------------------

const termCanvas = document.createElement('canvas');
termCanvas.width = 512;
termCanvas.height = 256;

const termCtx = termCanvas.getContext('2d');

const terminalTexture = new THREE.CanvasTexture(termCanvas);

screen.material = new THREE.MeshBasicMaterial({
  map:terminalTexture
});

const terminalLines = [
"PITCH_DARK_ARCHIVE :: ACTIVE",
"ROOM STATUS :: OBSERVED",
"ARCHIVE NODE :: SEALED",
"TRANSMISSION STATUS :: LOW",
"When shall we three meet again...",
"The rest is silence.",
"Full fathom five thy father lies.",
"We are such stuff as dreams are made on...",
"Something wicked this way comes.",
"Out, out, brief candle."
];

let currentLine = 0;
let cursorVisible = true;

function drawTerminal(){

  termCtx.fillStyle = '#000000';
  termCtx.fillRect(0,0,512,256);

  termCtx.fillStyle = 'rgba(0,255,80,0.04)';
  termCtx.fillRect(0,0,512,256);

  termCtx.fillStyle = '#00ff66';
  termCtx.font = '18px monospace';

  termCtx.fillText(
    'PITCH_DARK_STUDIOS',
    20,
    42
  );

  termCtx.fillStyle = '#33dd77';
  termCtx.font = '15px monospace';

  termCtx.fillText(
    terminalLines[currentLine],
    20,
    110
  );

  if(cursorVisible){

    termCtx.fillStyle = '#00ff66';

    termCtx.fillRect(
      24,
      128,
      11,
      3
    );
  }

  terminalTexture.needsUpdate = true;
}

drawTerminal();

setInterval(()=>{
  cursorVisible = !cursorVisible;
  drawTerminal();
},900);

setInterval(()=>{
  currentLine = (currentLine + 1) % terminalLines.length;
  drawTerminal();
},7000);

const base =
 new THREE.Mesh(
new THREE.BoxGeometry(1.85,.25,1.2),
blackMat
);

base.position.set(0,2.15,0);
base.castShadow = true;
computer.add(base);

const keyboard = new THREE.Mesh(
new THREE.BoxGeometry(1.2,.08,.55),
blackMat
);

keyboard.position.set(0,2.27,.72);
keyboard.castShadow = true;
computer.add(keyboard);

// RED SYSTEM LIGHT
const redLED = new THREE.Mesh(
new THREE.SphereGeometry(.035,12,12),
new THREE.MeshBasicMaterial({
color:0xff2200
})
);

redLED.position.set(.5,2.22,.62);
computer.add(redLED);

// --------------------------------------------------
// NOTEBOOK
// --------------------------------------------------

const notebook = new THREE.Mesh(
new THREE.BoxGeometry(.8,.13,.55),
paperMat
);

notebook.position.set(-1.75,2.3,.2);
notebook.rotation.y = .1;
notebook.castShadow = true;
scene.add(notebook);

// loose pages
for(let i=0;i<6;i++){

  const page = new THREE.Mesh(
    new THREE.BoxGeometry(.72,.015,.5),
    new THREE.MeshStandardMaterial({
      color:0x8b7561,
      roughness:1
    })
  );

  page.position.set(
    -1.75 + (Math.random()-.5)*.08,
    2.38 + i*.016,
    .2 + (Math.random()-.5)*.08
  );

  page.rotation.y = .1 + (Math.random()-.5)*.15;

  page.castShadow = true;

  scene.add(page);
}

// --------------------------------------------------
// KEYS
// --------------------------------------------------

const keyRing = new THREE.Mesh(
new THREE.TorusGeometry(.07,.01,8,18),
metalMat
);

keyRing.rotation.x = Math.PI/2;
keyRing.position.set(-1.15,2.33,.32);
keyRing.castShadow = true;
scene.add(keyRing);

for(let i=0;i<3;i++){

  const key = new THREE.Mesh(
    new THREE.BoxGeometry(.22,.018,.04),
    metalMat
  );

  key.position.set(
    -1.02 + i*.03,
    2.33,
    .32 + i*.03
  );

  key.rotation.y = .4 + i*.2;

  key.castShadow = true;

  scene.add(key);
}

// --------------------------------------------------
// CHAIR
// --------------------------------------------------

const chair = new THREE.Group();
scene.add(chair);

function chairPart(w,h,d,x,y,z){

  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    chairMat
  );

  m.position.set(x,y,z);

  m.castShadow = true;
  m.receiveShadow = true;

  chair.add(m);
}

chairPart(1.05,.12,.95,0,1.15,2.15);

chairPart(1.08,.14,.08,0,1.75,2.55);

chairPart(.09,.9,.08,-.46,1.48,2.55);
chairPart(.09,.9,.08,.46,1.48,2.55);

chairPart(.055,.82,.06,-.22,1.47,2.55);
chairPart(.055,.82,.06,0,1.47,2.55);
chairPart(.055,.82,.06,.22,1.47,2.55);

chairPart(.08,1,.08,-.42,.55,1.76);
chairPart(.08,1,.08,.42,.55,1.76);

chairPart(.08,1.25,.08,-.42,.62,2.54);
chairPart(.08,1.25,.08,.42,.62,2.54);

// --------------------------------------------------
// LIGHTING
// --------------------------------------------------

// MORE VISIBLE SPACE
const ambient = new THREE.AmbientLight(0x404040,.62);
scene.add(ambient);

// MAIN SPOT
const spot = new THREE.SpotLight(
0xf4ead8,
95,
70,
.52,
.58,
1
);

spot.position.set(0,13,-2);
spot.target.position.set(0,2.2,0);

spot.castShadow = true;

spot.shadow.mapSize.width = 1024;
spot.shadow.mapSize.height = 1024;

scene.add(spot.target);
scene.add(spot);

// CRT GLOW
const screenGlow = new THREE.PointLight(
0x00ff66,
2.8,
8
);

screenGlow.position.set(0,3,.8);
scene.add(screenGlow);

// RED LED GLOW
const redGlow = new THREE.PointLight(
0xff2200,
.9,
1.4
);

redGlow.position.set(.5,2.22,.65);
scene.add(redGlow);

// FAINT ENVIRONMENTAL FILL
const fill = new THREE.PointLight(
0x223344,
14,
60
);

fill.position.set(0,5,8);
scene.add(fill);

const rearFill = new THREE.PointLight(
0x1a1f24,
3,
18
);

rearFill.position.set(0,4,-5);
scene.add(rearFill);

// --------------------------------------------------
// MOVEMENT
// --------------------------------------------------

let yaw = 0;

const keys = {};

window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

function move(){

// FASTER AGAIN
const speed = .22;

const forward = new THREE.Vector3(
Math.sin(yaw),
0,
Math.cos(yaw)
);

if(keys['ArrowUp']){

  camera.position.add(
    forward.clone().multiplyScalar(-speed)
  );
}

if(keys['ArrowDown']){

  camera.position.add(
    forward.clone().multiplyScalar(speed)
  );
}

// SMOOTHER TURN
if(keys['ArrowLeft']) yaw += .045;
if(keys['ArrowRight']) yaw -= .045;

camera.position.z = Math.min(42,Math.max(-42,camera.position.z));
camera.position.x = Math.min(42,Math.max(-42,camera.position.x));

camera.rotation.order = 'YXZ';
camera.rotation.y = yaw;
}

// --------------------------------------------------
// ANIMATION
// --------------------------------------------------

function animate(){

requestAnimationFrame(animate);

move();


renderer.render(scene,camera);
}

animate();

// --------------------------------------------------
// RESIZE
// --------------------------------------------------

window.addEventListener('resize',()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>
</body>
</html>
