<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch Dark Studio — V4</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Georgia,serif;
}

canvas{
display:block;
}

#title{
position:fixed;
top:22px;
left:50%;
transform:translateX(-50%);
color:#444;
font-size:11px;
letter-spacing:5px;
opacity:.75;
z-index:20;
}

#ui{
position:fixed;
bottom:20px;
left:20px;
color:#666;
font-size:11px;
letter-spacing:2px;
line-height:1.8;
opacity:.75;
z-index:20;
}

#overlay{
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at center,
transparent 32%,
rgba(0,0,0,.42) 72%,
rgba(0,0,0,.82) 100%);
z-index:10;
}
</style>
</head>

<body>

<div id="title">PITCH DARK STUDIO — V4</div>

<div id="ui">
↑ ↓ MOVE<br>
← → LOOK
</div>

<div id="overlay"></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020202);
scene.fog = new THREE.FogExp2(0x000000,0.018);

const camera = new THREE.PerspectiveCamera(
58,
window.innerWidth/window.innerHeight,
0.1,
100
);

// HUMAN HEIGHT
camera.position.set(0,3.75,10);

const renderer = new THREE.WebGLRenderer({
antialias:true,
powerPreference:'high-performance'
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
renderer.outputColorSpace = THREE.SRGBColorSpace;

renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

document.body.appendChild(renderer.domElement);

// --------------------------------------------------
// MATERIALS
// --------------------------------------------------

const blackMat = new THREE.MeshStandardMaterial({
color:0x0a0a0a,
roughness:1
});

const deskMat = new THREE.MeshStandardMaterial({
color:0x221811,
roughness:.92
});

const chairMat = new THREE.MeshStandardMaterial({
color:0x1b1512,
roughness:.95
});

const paperMat = new THREE.MeshStandardMaterial({
color:0x5f4d40,
roughness:1
});

const rugMat = new THREE.MeshStandardMaterial({
color:0x2d1a16,
roughness:1
});

const metalMat = new THREE.MeshStandardMaterial({
color:0x555555,
roughness:.55,
metalness:.5
});

// --------------------------------------------------
// FLOOR
// --------------------------------------------------

const floor = new THREE.Mesh(
new THREE.PlaneGeometry(80,80),
new THREE.MeshStandardMaterial({
color:0x101010,
roughness:1
})
);

floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// subtle floor texture lines
for(let i=-30;i<=30;i+=2){
  const line = new THREE.Mesh(
    new THREE.BoxGeometry(80,.001,.02),
    new THREE.MeshBasicMaterial({
      color:0x151515
    })
  );

  line.position.set(0,.001,i);
  scene.add(line);
}

// --------------------------------------------------
// RUG
// --------------------------------------------------

const rug = new THREE.Mesh(
new THREE.PlaneGeometry(2.1,1.45),
rugMat
);

rug.rotation.x = -Math.PI/2;
rug.position.y = .01;
rug.position.z = .7;
rug.receiveShadow = true;
scene.add(rug);

// --------------------------------------------------
// DESK
// --------------------------------------------------

const desk = new THREE.Group();
scene.add(desk);

function part(w,h,d,x,y,z,mat=deskMat){
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    mat
  );

  m.position.set(x,y,z);
  m.castShadow = true;
  m.receiveShadow = true;
  desk.add(m);

  return m;
}

part(7,.18,2.8,0,2.2,0);

part(.25,2.2,.25,-3.1,1.1,-1.1);
part(.25,2.2,.25,3.1,1.1,-1.1);
part(.25,2.2,.25,-3.1,1.1,1.1);
part(.25,2.2,.25,3.1,1.1,1.1);

part(1.2,2,2.4,-2.2,1,-.05);
part(1.2,2,2.4,2.2,1,-.05);

// --------------------------------------------------
// DRAWERS
// --------------------------------------------------

for(let side of [-2.2,2.2]){

  for(let y of [.55,1.1,1.65]){

    const handle = new THREE.Mesh(
      new THREE.BoxGeometry(.34,.04,.06),
      metalMat
    );

    handle.position.set(side,y,1.22);
    handle.castShadow = true;
    desk.add(handle);
  }
}

// --------------------------------------------------
// COMPUTER
// --------------------------------------------------

const computer = new THREE.Group();
scene.add(computer);

const monitor = new THREE.Mesh(
new THREE.BoxGeometry(1.45,1.3,1.08),
blackMat
);

monitor.position.set(0,3.0,0);
monitor.castShadow = true;
computer.add(monitor);

const screen = new THREE.Mesh(
new THREE.PlaneGeometry(.9,.7),
new THREE.MeshBasicMaterial({
color:0x14552c
})
);

screen.position.set(0,3.03,.56);
computer.add(screen);

// screen lines
for(let i=0;i<12;i++){

  const line = new THREE.Mesh(
    new THREE.PlaneGeometry(.28 + Math.random()*.25,.012),
    new THREE.MeshBasicMaterial({
      color:0x33cc77
    })
  );

  line.position.set(
    -.15 + Math.random()*.15,
    3.23 - i*.045,
    .565
  );

  computer.add(line);
}

const base = new THREE.Mesh(
new THREE.BoxGeometry(1.85,.25,1.2),
blackMat
);

base.position.set(0,2.15,0);
base.castShadow = true;
computer.add(base);

const keyboard = new THREE.Mesh(
new THREE.BoxGeometry(1.2,.08,.55),
blackMat
);

keyboard.position.set(0,2.27,.72);
keyboard.castShadow = true;
computer.add(keyboard);

// RED SYSTEM LIGHT
const redLED = new THREE.Mesh(
new THREE.SphereGeometry(.035,12,12),
new THREE.MeshBasicMaterial({
color:0xff2200
})
);

redLED.position.set(.5,2.22,.62);
computer.add(redLED);

// --------------------------------------------------
// NOTEBOOK
// --------------------------------------------------

const notebook = new THREE.Mesh(
new THREE.BoxGeometry(.8,.13,.55),
paperMat
);

notebook.position.set(-1.75,2.3,.2);
notebook.rotation.y = .1;
notebook.castShadow = true;
scene.add(notebook);

// loose pages
for(let i=0;i<6;i++){

  const page = new THREE.Mesh(
    new THREE.BoxGeometry(.72,.015,.5),
    new THREE.MeshStandardMaterial({
      color:0x665548,
      roughness:1
    })
  );

  page.position.set(
    -1.75 + (Math.random()-.5)*.08,
    2.38 + i*.016,
    .2 + (Math.random()-.5)*.08
  );

  page.rotation.y = .1 + (Math.random()-.5)*.15;

  page.castShadow = true;

  scene.add(page);
}

// --------------------------------------------------
// KEYS
// --------------------------------------------------

const keyRing = new THREE.Mesh(
new THREE.TorusGeometry(.07,.01,8,18),
metalMat
);

keyRing.rotation.x = Math.PI/2;
keyRing.position.set(-1.15,2.33,.32);
keyRing.castShadow = true;
scene.add(keyRing);

for(let i=0;i<3;i++){

  const key = new THREE.Mesh(
    new THREE.BoxGeometry(.22,.018,.04),
    metalMat
  );

  key.position.set(
    -1.02 + i*.03,
    2.33,
    .32 + i*.03
  );

  key.rotation.y = .4 + i*.2;

  key.castShadow = true;

  scene.add(key);
}

// --------------------------------------------------
// CHAIR
// --------------------------------------------------

const chair = new THREE.Group();
scene.add(chair);

function chairPart(w,h,d,x,y,z){

  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    chairMat
  );

  m.position.set(x,y,z);

  m.castShadow = true;
  m.receiveShadow = true;

  chair.add(m);
}

chairPart(1.05,.12,.95,0,1.15,2.15);

chairPart(1.08,.14,.08,0,1.75,2.55);

chairPart(.09,.9,.08,-.46,1.48,2.55);
chairPart(.09,.9,.08,.46,1.48,2.55);

chairPart(.055,.82,.06,-.22,1.47,2.55);
chairPart(.055,.82,.06,0,1.47,2.55);
chairPart(.055,.82,.06,.22,1.47,2.55);

chairPart(.08,1,.08,-.42,.55,1.76);
chairPart(.08,1,.08,.42,.55,1.76);

chairPart(.08,1.25,.08,-.42,.62,2.54);
chairPart(.08,1.25,.08,.42,.62,2.54);

// --------------------------------------------------
// LIGHTING
// --------------------------------------------------

// MORE VISIBLE SPACE
const ambient = new THREE.AmbientLight(0x404040,.62);
scene.add(ambient);

// MAIN SPOT
const spot = new THREE.SpotLight(
0xe6edf7,
70,
55,
.45,
.45,
1
);

spot.position.set(0,13,-2);
spot.target.position.set(0,2.2,0);

spot.castShadow = true;

spot.shadow.mapSize.width = 1024;
spot.shadow.mapSize.height = 1024;

scene.add(spot.target);
scene.add(spot);

// CRT GLOW
const screenGlow = new THREE.PointLight(
0x00aa55,
1.4,
5
);

screenGlow.position.set(0,3,.8);
scene.add(screenGlow);

// RED LED GLOW
const redGlow = new THREE.PointLight(
0xff2200,
.24,
.7
);

redGlow.position.set(.5,2.22,.65);
scene.add(redGlow);

// FAINT ENVIRONMENTAL FILL
const fill = new THREE.PointLight(
0x223344,
10,
34
);

fill.position.set(0,5,8);
scene.add(fill);

const rearFill = new THREE.PointLight(
0x1a1f24,
3,
18
);

rearFill.position.set(0,4,-5);
scene.add(rearFill);

// --------------------------------------------------
// DUST
// --------------------------------------------------

const dustGeo = new THREE.BufferGeometry();

const dustCount = 800;

const dustPos = new Float32Array(dustCount * 3);

for(let i=0;i<dustCount;i++){

  dustPos[i*3] = (Math.random()-.5)*12;
  dustPos[i*3+1] = Math.random()*8;
  dustPos[i*3+2] = (Math.random()-.5)*12;
}

dustGeo.setAttribute(
'position',
new THREE.BufferAttribute(dustPos,3)
);

const dust = new THREE.Points(
dustGeo,
new THREE.PointsMaterial({
color:0xffffff,
size:.02,
transparent:true,
opacity:.06
})
);

scene.add(dust);

// --------------------------------------------------
// MOVEMENT
// --------------------------------------------------

let yaw = 0;

const keys = {};

window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

function move(){

// FASTER AGAIN
const speed = .075;

const forward = new THREE.Vector3(
Math.sin(yaw),
0,
Math.cos(yaw)
);

if(keys['ArrowUp']){

  camera.position.add(
    forward.clone().multiplyScalar(-speed)
  );
}

if(keys['ArrowDown']){

  camera.position.add(
    forward.clone().multiplyScalar(speed)
  );
}

// SMOOTHER TURN
if(keys['ArrowLeft']) yaw += .022;
if(keys['ArrowRight']) yaw -= .022;

camera.position.z = Math.min(16,Math.max(-6,camera.position.z));
camera.position.x = Math.min(8,Math.max(-8,camera.position.x));

camera.rotation.order = 'YXZ';
camera.rotation.y = yaw;
}

// --------------------------------------------------
// ANIMATION
// --------------------------------------------------

function animate(){

requestAnimationFrame(animate);

move();

dust.rotation.y += .00012;

renderer.render(scene,camera);
}

animate();

// --------------------------------------------------
// RESIZE
// --------------------------------------------------

window.addEventListener('resize',()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>
</body>
</html>
