<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pitch Dark Studios — The Room</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Georgia,serif}
canvas{display:block}
#overlay{
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at center, transparent 58%, rgba(0,0,0,.32) 100%),
linear-gradient(to bottom, rgba(0,0,0,.03), rgba(0,0,0,.25));
z-index:5;
}
#ui{
position:fixed;
left:28px;
bottom:24px;
color:#d0a060;
font-size:12px;
letter-spacing:2px;
opacity:.75;
line-height:1.8;
z-index:10;
}
</style>
</head>

<body>
<div id="ui">
↑ — FORWARD<br>
↓ — BACKWARD<br>
← — LOOK LEFT<br>
→ — LOOK RIGHT
</div>
<div id="overlay"></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0908,0.006);

const camera = new THREE.PerspectiveCamera(62,window.innerWidth/window.innerHeight,0.1,2000);
camera.position.set(0,3.2,12);

const renderer = new THREE.WebGLRenderer({antialias:true,powerPreference:"high-performance"});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const room = new THREE.Group();
scene.add(room);

const floor = new THREE.Mesh(
new THREE.PlaneGeometry(42,42),
new THREE.MeshStandardMaterial({color:0x3a2618,roughness:.95})
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
room.add(floor);

const wallMat = new THREE.MeshStandardMaterial({color:0x1f1510,roughness:1});

function wall(w,h,x,y,z,ry=0){
const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w,h),wallMat);
mesh.position.set(x,y,z);
mesh.rotation.y = ry;
room.add(mesh);
}

wall(42,18,0,9,-21,0);
wall(42,18,0,9,21,Math.PI);
wall(42,18,-21,9,0,Math.PI/2);
wall(42,18,21,9,0,-Math.PI/2);

const ceiling = new THREE.Mesh(
new THREE.PlaneGeometry(42,42),
new THREE.MeshStandardMaterial({color:0x11100f})
);
ceiling.rotation.x = Math.PI/2;
ceiling.position.y = 18;
room.add(ceiling);

function shelf(x,z,rot=0){
const g = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(5,13,1.2),
new THREE.MeshStandardMaterial({color:0x342015,roughness:.9})
);
body.position.y = 6.5;
g.add(body);

for(let y=1;y<12;y+=2.2){
const plank = new THREE.Mesh(
new THREE.BoxGeometry(5.1,.12,1.25),
new THREE.MeshStandardMaterial({color:0x25170f})
);
plank.position.y = y;
g.add(plank);
}

for(let i=0;i<120;i++){
const b = new THREE.Mesh(
new THREE.BoxGeometry(.18,1+Math.random()*.5,.7),
new THREE.MeshStandardMaterial({
color:new THREE.Color().setHSL(.05+Math.random()*.03,.5,.24+Math.random()*.14)
})
);
b.position.set(-2+Math.random()*4,.7+Math.floor(i/20)*2.2,0);
g.add(b);
}

g.position.set(x,0,z);
g.rotation.y = rot;
room.add(g);
}

shelf(-18,-12,Math.PI/2);
shelf(-18,0,Math.PI/2);
shelf(-18,12,Math.PI/2);
shelf(18,-12,-Math.PI/2);
shelf(18,0,-Math.PI/2);
shelf(18,12,-Math.PI/2);
shelf(-8,-18,0);
shelf(8,-18,0);

const desk = new THREE.Mesh(
new THREE.BoxGeometry(6,1.2,3),
new THREE.MeshStandardMaterial({color:0x4a2f1d,roughness:.9})
);
desk.position.set(0,.6,3);
desk.castShadow = true;
room.add(desk);

const chair = new THREE.Mesh(
new THREE.BoxGeometry(1.5,1.5,1.5),
new THREE.MeshStandardMaterial({color:0x2a1a10})
);
chair.position.set(.5,.8,6);
chair.rotation.y = .4;
room.add(chair);

const lamp = new THREE.PointLight(0xffc27a,38,45,1.6);
lamp.position.set(0,4,3);
lamp.castShadow = true;
room.add(lamp);

const lampGlow = new THREE.Mesh(
new THREE.SphereGeometry(.16,16,16),
new THREE.MeshBasicMaterial({color:0xffc07a})
);
lampGlow.position.copy(lamp.position);
room.add(lampGlow);

const moon = new THREE.SpotLight(0xbfd8ff,30,120,.8,.5,1);
moon.position.set(0,16,-10);
moon.target.position.set(0,3,-18);
scene.add(moon.target);
scene.add(moon);

const windowFrame = new THREE.Mesh(
new THREE.BoxGeometry(8,10,.3),
new THREE.MeshStandardMaterial({color:0x151515})
);
windowFrame.position.set(0,8,-20.5);
room.add(windowFrame);

for(let i=0;i<6;i++){
const bar = new THREE.Mesh(
new THREE.BoxGeometry(.08,10,.08),
new THREE.MeshBasicMaterial({color:0x333333})
);
bar.position.set(-3+i*1.2,8,-20.3);
room.add(bar);
}

const ambient = new THREE.AmbientLight(0x6b4c2c,.42);
scene.add(ambient);

const dustGeo = new THREE.BufferGeometry();
const dustCount = 1200;
const positions = new Float32Array(dustCount*3);
for(let i=0;i<dustCount*3;i++){ positions[i]=(Math.random()-.5)*60; }
dustGeo.setAttribute('position',new THREE.BufferAttribute(positions,3));
const dust = new THREE.Points(
dustGeo,
new THREE.PointsMaterial({color:0xffd7a0,size:.035,transparent:true,opacity:.22})
);
scene.add(dust);

let yaw = 0;
const keys = {};
window.addEventListener('keydown',e=>{keys[e.key]=true;});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

function move(){
const speed=.055;
const forward=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));

if(keys['ArrowUp']) camera.position.add(forward.clone().multiplyScalar(-speed));
if(keys['ArrowDown']) camera.position.add(forward.clone().multiplyScalar(speed));
if(keys['ArrowLeft']) yaw += .022;
if(keys['ArrowRight']) yaw -= .022;

camera.position.x = Math.max(-19,Math.min(19,camera.position.x));
camera.position.z = Math.max(-19,Math.min(19,camera.position.z));

camera.rotation.order='YXZ';
camera.rotation.y=yaw;
camera.rotation.x=0;
}

function animate(){
requestAnimationFrame(animate);
move();
dust.rotation.y += .00005;
lamp.intensity = 36 + Math.sin(Date.now()*.002)*1.2;
renderer.render(scene,camera);
}

animate();

window.addEventListener('resize',()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
});
</script>
</body>
</html>
