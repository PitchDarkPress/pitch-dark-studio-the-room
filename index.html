<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pitch Dark Studios — The Room</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Georgia, serif;
    }

    canvas { display: block; }

    #overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 45%, rgba(0,0,0,.45) 100%),
        linear-gradient(to bottom, rgba(0,0,0,.08), rgba(0,0,0,.45));
    }

    #ui {
      position: fixed;
      left: 28px;
      bottom: 24px;
      color: #d0a060;
      font-size: 12px;
      letter-spacing: 2px;
      opacity: .75;
      line-height: 1.8;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="ui">
  W A S D — MOVE<br>
  MOUSE — LOOK
</div>

<div id="overlay"></div>

<script type="module" src="./main.js"></script>

</body>
</html>
