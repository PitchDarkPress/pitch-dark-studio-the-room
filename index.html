<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch Dark Studios — V5 Obvious Architecture</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Georgia,serif}
canvas{display:block}
#ui{
position:fixed;left:28px;bottom:24px;z-index:10;
color:#d0a060;font-size:12px;letter-spacing:2px;opacity:.75;line-height:1.8
}
#overlay{
position:fixed;inset:0;pointer-events:none;z-index:5;
background:radial-gradient(circle at center,transparent 55%,rgba(0,0,0,.38) 100%),
linear-gradient(to bottom,rgba(0,0,0,.08),rgba(0,0,0,.35))
}
</style>
</head>
<body>
<div id="ui">↑ — FORWARD<br>↓ — BACKWARD<br>← — LOOK LEFT<br>→ — LOOK RIGHT</div>
<div id="overlay"></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x080706,0.0032);

const camera = new THREE.PerspectiveCamera(58,window.innerWidth/window.innerHeight,0.1,2000);
camera.position.set(0,4.2,24);

const renderer = new THREE.WebGLRenderer({antialias:true,powerPreference:"high-performance"});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const room = new THREE.Group();
scene.add(room);

const matFloor = new THREE.MeshStandardMaterial({color:0x3a2416,roughness:.92});
const matWall = new THREE.MeshStandardMaterial({color:0x1b120e,roughness:1});
const matWood = new THREE.MeshStandardMaterial({color:0x2c1a10,roughness:.9});
const matDarkWood = new THREE.MeshStandardMaterial({color:0x160d08,roughness:.95});

const floor = new THREE.Mesh(new THREE.PlaneGeometry(90,90),matFloor);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
room.add(floor);

function box(w,h,d,x,y,z,mat=matWood,ry=0){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z);
  m.rotation.y = ry;
  m.castShadow = true;
  m.receiveShadow = true;
  room.add(m);
  return m;
}

// DEEP TALL ROOM
box(90,32,.8,0,16,-45,matWall);
box(90,32,.8,0,16,45,matWall);
box(.8,32,90,-45,16,0,matWall);
box(.8,32,90,45,16,0,matWall);

// HIGH CEILING
const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(90,90),new THREE.MeshStandardMaterial({color:0x070605,roughness:1}));
ceiling.rotation.x = Math.PI/2;
ceiling.position.y = 32;
room.add(ceiling);

// GOTHIC WINDOW — BIG AND OBVIOUS
box(18,24,.6,0,15,-44.4,new THREE.MeshStandardMaterial({color:0x0a0c0e,roughness:.4}));
const glass = new THREE.Mesh(new THREE.PlaneGeometry(15,21),new THREE.MeshBasicMaterial({color:0x6f93a8,transparent:true,opacity:.28}));
glass.position.set(0,15,-44.05);
room.add(glass);

for(let x=-6;x<=6;x+=3){ box(.18,22,.2,x,15,-43.9,new THREE.MeshBasicMaterial({color:0x111})); }
for(let y=6;y<=24;y+=4){ box(16,.16,.2,0,y,-43.88,new THREE.MeshBasicMaterial({color:0x111})); }

// pointed arch suggestion
const archShape = new THREE.Shape();
archShape.moveTo(-8,0);
archShape.lineTo(-8,12);
archShape.quadraticCurveTo(-8,22,0,28);
archShape.quadraticCurveTo(8,22,8,12);
archShape.lineTo(8,0);
const archGeo = new THREE.ShapeGeometry(archShape);
const archMat = new THREE.MeshBasicMaterial({color:0x0b0b0b,side:THREE.DoubleSide});
const arch = new THREE.Mesh(archGeo,archMat);
arch.position.set(0,2,-43.7);
room.add(arch);

// TALL WALL-TO-WALL SHELVES
function shelfWall(side){
  const x = side === "left" ? -43.4 : 43.4;
  const rot = side === "left" ? Math.PI/2 : -Math.PI/2;
  for(let z=-30; z<=30; z+=10){
    const group = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(8,27,1.4),matWood);
    body.position.y = 13.5;
    group.add(body);
    for(let y=2;y<26;y+=3){
      const plank = new THREE.Mesh(new THREE.BoxGeometry(8.2,.18,1.55),matDarkWood);
      plank.position.y = y;
      group.add(plank);
    }
    for(let i=0;i<210;i++){
      const b = new THREE.Mesh(
        new THREE.BoxGeometry(.22,1.2+Math.random()*1.2,.8),
        new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(.05+Math.random()*.04,.48,.18+Math.random()*.18)})
      );
      b.position.set(-3.5+Math.random()*7,1.2+Math.floor(i/24)*2.9,0);
      group.add(b);
    }
    group.position.set(x,0,z);
    group.rotation.y = rot;
    room.add(group);
  }
}
shelfWall("left");
shelfWall("right");

for(let x=-26; x<=26; x+=10){
  const group = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(8,25,1.4),matWood);
  body.position.y = 12.5; group.add(body);
  for(let y=2;y<24;y+=3){
    const plank = new THREE.Mesh(new THREE.BoxGeometry(8.2,.18,1.55),matDarkWood);
    plank.position.y = y; group.add(plank);
  }
  for(let i=0;i<180;i++){
    const b = new THREE.Mesh(new THREE.BoxGeometry(.22,1.2+Math.random()*1,.8),
      new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(.05+Math.random()*.04,.48,.2+Math.random()*.16)})
    );
    b.position.set(-3.5+Math.random()*7,1.2+Math.floor(i/24)*2.9,0);
    group.add(b);
  }
  group.position.set(x,0,-42.8);
  room.add(group);
}

// BIG CENTRAL DESK + CHAIR
box(13,1.4,6,0,.7,9,new THREE.MeshStandardMaterial({color:0x4b2f1d,roughness:.85}));
box(2.5,2.5,2.5,0,1.25,16,new THREE.MeshStandardMaterial({color:0x24150e,roughness:.9}),.25);

// lamp
const lamp = new THREE.PointLight(0xffc27a,70,85,1.5);
lamp.position.set(0,6.5,9);
lamp.castShadow = true;
room.add(lamp);
const glow = new THREE.Mesh(new THREE.SphereGeometry(.25,24,24),new THREE.MeshBasicMaterial({color:0xffd3a0}));
glow.position.copy(lamp.position);
room.add(glow);

// MOONLIGHT
const moon = new THREE.SpotLight(0xc3ddff,85,220,.55,.45,1);
moon.position.set(0,30,-28);
moon.target.position.set(0,8,0);
scene.add(moon.target);
scene.add(moon);

scene.add(new THREE.AmbientLight(0x735334,.48));

// visible floor planks
for(let x=-42;x<=42;x+=3){
  box(.05,.03,90,x,.02,0,new THREE.MeshBasicMaterial({color:0x1e120b}));
}

// dust
const dustGeo = new THREE.BufferGeometry();
const count = 1600;
const positions = new Float32Array(count*3);
for(let i=0;i<count*3;i++) positions[i]=(Math.random()-.5)*95;
dustGeo.setAttribute('position',new THREE.BufferAttribute(positions,3));
const dust = new THREE.Points(dustGeo,new THREE.PointsMaterial({color:0xffd7a0,size:.04,transparent:true,opacity:.22}));
scene.add(dust);

let yaw = 0;
const keys = {};
window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

function move(){
  const speed = .09;
  const forward = new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
  if(keys['ArrowUp']) camera.position.add(forward.clone().multiplyScalar(-speed));
  if(keys['ArrowDown']) camera.position.add(forward.clone().multiplyScalar(speed));
  if(keys['ArrowLeft']) yaw += .021;
  if(keys['ArrowRight']) yaw -= .021;

  camera.position.x = Math.max(-39,Math.min(39,camera.position.x));
  camera.position.z = Math.max(-39,Math.min(39,camera.position.z));
  camera.position.y = 4.2;

  camera.rotation.order='YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = 0;
}

function animate(){
  requestAnimationFrame(animate);
  move();
  dust.rotation.y += .00004;
  lamp.intensity = 68 + Math.sin(Date.now()*.002)*2;
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
});
</script>
</body>
</html>
