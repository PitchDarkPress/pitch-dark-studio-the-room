<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pitch Dark Studio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Georgia,serif;
}

canvas{
display:block;
}

#ui{
position:fixed;
bottom:20px;
left:20px;
color:#6e6e6e;
font-size:11px;
letter-spacing:2px;
line-height:1.8;
opacity:.7;
z-index:20;
}

#title{
position:fixed;
top:22px;
left:50%;
transform:translateX(-50%);
color:#3d3d3d;
font-size:11px;
letter-spacing:5px;
opacity:.7;
z-index:20;
}

#overlay{
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at center,
transparent 30%,
rgba(0,0,0,.55) 75%,
rgba(0,0,0,.92) 100%);
z-index:10;
}
</style>
</head>

<body>

<div id="title">PITCH DARK STUDIO</div>

<div id="ui">
↑ ↓ MOVE<br>
← → LOOK
</div>

<div id="overlay"></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000,0.03);

const camera = new THREE.PerspectiveCamera(
55,
window.innerWidth/window.innerHeight,
0.1,
100
);

camera.position.set(0,2.3,9);

const renderer = new THREE.WebGLRenderer({
antialias:true,
powerPreference:'high-performance'
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const blackMat = new THREE.MeshStandardMaterial({
color:0x0a0a0a,
roughness:1
});

const deskMat = new THREE.MeshStandardMaterial({
color:0x1b1613,
roughness:.92
});

const chairMat = new THREE.MeshStandardMaterial({
color:0x181818,
roughness:.95
});

const rugMat = new THREE.MeshStandardMaterial({
color:0x2a1915,
roughness:1
});

const paperMat = new THREE.MeshStandardMaterial({
color:0x5b4b3f,
roughness:1
});

const floor = new THREE.Mesh(
new THREE.PlaneGeometry(50,50),
new THREE.MeshStandardMaterial({
color:0x050505,
roughness:1
})
);

floor.rotation.x = -Math.PI/2;
scene.add(floor);

const rug = new THREE.Mesh(
new THREE.PlaneGeometry(2.2,1.6),
rugMat
);

rug.rotation.x = -Math.PI/2;
rug.position.y = 0.01;
rug.position.z = .6;
scene.add(rug);

const desk = new THREE.Group();
scene.add(desk);

const top = new THREE.Mesh(
new THREE.BoxGeometry(7,0.18,2.8),
deskMat
);

top.position.y = 2.2;
desk.add(top);

function leg(x,z){
const m = new THREE.Mesh(
new THREE.BoxGeometry(.25,2.2,.25),
deskMat
);

m.position.set(x,1.1,z);
desk.add(m);
}

leg(-3.1,-1.1);
leg(3.1,-1.1);
leg(-3.1,1.1);
leg(3.1,1.1);

function drawers(x){
const block = new THREE.Mesh(
new THREE.BoxGeometry(1.2,2,2.4),
deskMat
);

block.position.set(x,1,-0.05);
desk.add(block);
}

drawers(-2.2);
drawers(2.2);

const computer = new THREE.Group();
scene.add(computer);

const monitor = new THREE.Mesh(
new THREE.BoxGeometry(1.4,1.3,1.1),
blackMat
);

monitor.position.set(0,3.0,0);
computer.add(monitor);

const screen = new THREE.Mesh(
new THREE.PlaneGeometry(.9,.7),
new THREE.MeshBasicMaterial({
color:0x0d4422
})
);

screen.position.set(0,3.03,.56);
computer.add(screen);

const base = new THREE.Mesh(
new THREE.BoxGeometry(1.8,.25,1.2),
blackMat
);

base.position.set(0,2.15,0);
computer.add(base);

const keyboard = new THREE.Mesh(
new THREE.BoxGeometry(1.2,.08,.55),
blackMat
);

keyboard.position.set(0,2.27,.72);
computer.add(keyboard);

const redLight = new THREE.Mesh(
new THREE.SphereGeometry(.03,10,10),
new THREE.MeshBasicMaterial({color:0xff2200})
);

redLight.position.set(.48,2.22,.6);
computer.add(redLight);

const notebook = new THREE.Mesh(
new THREE.BoxGeometry(.7,.12,.5),
paperMat
);

notebook.position.set(-1.7,2.3,.2);
scene.add(notebook);

const keys = new THREE.Group();
scene.add(keys);

for(let i=0;i<3;i++){
const key = new THREE.Mesh(
new THREE.TorusGeometry(.04,.01,6,12),
new THREE.MeshStandardMaterial({
color:0x666666,
roughness:.5,
metalness:.6
})
);

key.rotation.x = Math.PI/2;
key.position.set(-1.2 + i*.05,2.3,.3 + i*.03);
keys.add(key);
}

const chair = new THREE.Group();
scene.add(chair);

const seat = new THREE.Mesh(
new THREE.BoxGeometry(1,.12,1),
chairMat
);

seat.position.set(0,1.2,2.1);
chair.add(seat);

const back = new THREE.Mesh(
new THREE.BoxGeometry(1,.9,.08),
chairMat
);

back.position.set(0,1.7,2.55);
chair.add(back);

function chairLeg(x,z){
const l = new THREE.Mesh(
new THREE.BoxGeometry(.08,1,.08),
chairMat
);

l.position.set(x,.5,z);
chair.add(l);
}

chairLeg(-.4,1.7);
chairLeg(.4,1.7);
chairLeg(-.4,2.5);
chairLeg(.4,2.5);

const ambient = new THREE.AmbientLight(0x222222,.55);
scene.add(ambient);

const spot = new THREE.SpotLight(0xdde7ff,25,40,.33,.6,1);
spot.position.set(0,12,0);
spot.target.position.set(0,2,0);
scene.add(spot.target);
scene.add(spot);

const screenGlow = new THREE.PointLight(0x00aa55,.7,3);
screenGlow.position.set(0,3,.8);
scene.add(screenGlow);

let yaw = 0;
const keysPressed = {};

window.addEventListener('keydown',e=>keysPressed[e.key]=true);
window.addEventListener('keyup',e=>keysPressed[e.key]=false);

function move(){

const speed = .03;

const forward = new THREE.Vector3(
Math.sin(yaw),
0,
Math.cos(yaw)
);

if(keysPressed['ArrowUp']){
camera.position.add(
forward.clone().multiplyScalar(-speed)
);
}

if(keysPressed['ArrowDown']){
camera.position.add(
forward.clone().multiplyScalar(speed)
);
}

if(keysPressed['ArrowLeft']) yaw += .015;
if(keysPressed['ArrowRight']) yaw -= .015;

camera.position.z = Math.min(14,Math.max(4,camera.position.z));
camera.position.x = Math.min(4,Math.max(-4,camera.position.x));

camera.rotation.order = 'YXZ';
camera.rotation.y = yaw;
}

function animate(){
requestAnimationFrame(animate);
move();
renderer.render(scene,camera);
}

animate();

window.addEventListener('resize',()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>
</body>
</html>
