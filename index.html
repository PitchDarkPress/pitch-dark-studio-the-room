
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDS Room</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Georgia,serif}
canvas{display:block}
#ui{
position:fixed;
left:28px;
bottom:24px;
color:#d0a060;
font-size:12px;
letter-spacing:2px;
opacity:.7;
line-height:1.8;
z-index:10;
}
</style>
</head>
<body>

<div id="ui">
↑ — FORWARD<br>
↓ — BACKWARD<br>
← — LOOK LEFT<br>
→ — LOOK RIGHT
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0908,0.010);

const camera = new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
2000
);

camera.position.set(0,3.2,12);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const room = new THREE.Group();
scene.add(room);

const floor = new THREE.Mesh(
new THREE.PlaneGeometry(42,42),
new THREE.MeshStandardMaterial({
color:0x3a2618,
roughness:.95
})
);

floor.rotation.x = -Math.PI/2;
room.add(floor);

const wallMat = new THREE.MeshStandardMaterial({
color:0x1f1510
});

function wall(w,h,x,y,z,ry=0){
const mesh = new THREE.Mesh(
new THREE.PlaneGeometry(w,h),
wallMat
);
mesh.position.set(x,y,z);
mesh.rotation.y = ry;
room.add(mesh);
}

wall(42,18,0,9,-21,0);
wall(42,18,0,9,21,Math.PI);
wall(42,18,-21,9,0,Math.PI/2);
wall(42,18,21,9,0,-Math.PI/2);

const ambient = new THREE.AmbientLight(0x6b4c2c,.42);
scene.add(ambient);

const lamp = new THREE.PointLight(0xffc27a,38,45,1.6);
lamp.position.set(0,4,3);
scene.add(lamp);

let yaw = 0;
const keys = {};

window.addEventListener('keydown',e=>{
keys[e.key] = true;
});

window.addEventListener('keyup',e=>{
keys[e.key] = false;
});

function move(){

const speed = 0.055;

const forward = new THREE.Vector3(
Math.sin(yaw),
0,
Math.cos(yaw)
);

if(keys['ArrowUp']){
camera.position.add(
forward.clone().multiplyScalar(speed)
);
}

if(keys['ArrowDown']){
camera.position.add(
forward.clone().multiplyScalar(-speed)
);
}

if(keys['ArrowLeft']){
yaw += 0.025;
}

if(keys['ArrowRight']){
yaw -= 0.025;
}

camera.rotation.order = 'YXZ';
camera.rotation.y = yaw;
}

function animate(){
requestAnimationFrame(animate);
move();
renderer.render(scene,camera);
}

animate();

window.addEventListener('resize',()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
