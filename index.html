<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pitch Dark Studios — Gothic Studio V7</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Georgia,serif;
}

canvas{display:block}

#overlay{
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at center, transparent 58%, rgba(0,0,0,.42) 100%),
linear-gradient(to bottom, rgba(0,0,0,.04), rgba(0,0,0,.38));
z-index:5;
}

#ui{
position:fixed;
left:28px;
bottom:24px;
color:#d0a060;
font-size:12px;
letter-spacing:2px;
line-height:1.8;
opacity:.72;
z-index:10;
}
</style>
</head>

<body>

<div id="ui">
V10 — FASTER MOVEMENT<br><br>
↑ — FORWARD<br>
↓ — BACKWARD<br>
← — LOOK LEFT<br>
→ — LOOK RIGHT
</div>

<div id="overlay"></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x070605,0.0022);

const camera = new THREE.PerspectiveCamera(
58,
window.innerWidth/window.innerHeight,
0.1,
2000
);

camera.position.set(0,4.7,32);

const renderer = new THREE.WebGLRenderer({
antialias:true,
powerPreference:'high-performance'
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

document.body.appendChild(renderer.domElement);

const room = new THREE.Group();
scene.add(room);

const woodDark = new THREE.MeshStandardMaterial({color:0x24150d,roughness:.88});
const woodMid = new THREE.MeshStandardMaterial({color:0x3f2819,roughness:.82});
const wallMat = new THREE.MeshStandardMaterial({color:0x16100d,roughness:1});
const paperMat = new THREE.MeshStandardMaterial({color:0xd2c1a4,roughness:1});

function box(w,h,d,x,y,z,mat=woodDark,ry=0){
const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
mesh.position.set(x,y,z);
mesh.rotation.y = ry;
mesh.castShadow = true;
mesh.receiveShadow = true;
room.add(mesh);
return mesh;
}

const floor = new THREE.Mesh(
new THREE.PlaneGeometry(120,120),
new THREE.MeshStandardMaterial({color:0x3b2518,roughness:.92})
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
room.add(floor);

for(let x=-58;x<=58;x+=2){
box(.06,.03,120,x,.02,0,new THREE.MeshBasicMaterial({color:0x1b120d}));
}

box(120,42,1,0,21,-60,wallMat);
box(120,42,1,0,21,60,wallMat);
box(1,42,120,-60,21,0,wallMat);
box(1,42,120,60,21,0,wallMat);

const ceiling = new THREE.Mesh(
new THREE.PlaneGeometry(120,120),
new THREE.MeshStandardMaterial({color:0x090807,roughness:1})
);
ceiling.rotation.x = Math.PI/2;
ceiling.position.y = 42;
room.add(ceiling);

// Large clearer gothic window
box(24,32,.8,0,19,-59.4,new THREE.MeshStandardMaterial({color:0x0d0f12,roughness:.4}));

const glass = new THREE.Mesh(
new THREE.PlaneGeometry(19,27),
new THREE.MeshBasicMaterial({color:0x9db4c6,transparent:true,opacity:.30})
);
glass.position.set(0,19,-58.8);
room.add(glass);

for(let x=-7.5;x<=7.5;x+=3.75){
box(.16,29,.12,x,19,-58.6,new THREE.MeshBasicMaterial({color:0x111}));
}

for(let y=7;y<=31;y+=4.5){
box(19,.16,.12,0,y,-58.6,new THREE.MeshBasicMaterial({color:0x111}));
}

// window sill / base
box(27,.45,2,0,4.1,-58.5,new THREE.MeshStandardMaterial({color:0x24160f,roughness:.9}));

for(let i=0;i<180;i++){
const rain = new THREE.Mesh(
new THREE.PlaneGeometry(.025,.9),
new THREE.MeshBasicMaterial({color:0xb7cbe0,transparent:true,opacity:.14})
);
rain.position.set(-9+Math.random()*18,6+Math.random()*25,-58.4);
room.add(rain);
}

function createShelfColumn(x,z,rot=0){
const group = new THREE.Group();

const body = new THREE.Mesh(new THREE.BoxGeometry(9,34,1.8),woodDark);
body.position.y = 17;
group.add(body);

for(let y=2;y<33;y+=3.1){
const shelf = new THREE.Mesh(
new THREE.BoxGeometry(9.2,.18,1.95),
new THREE.MeshStandardMaterial({color:0x1b100a,roughness:.9})
);
shelf.position.y = y;
group.add(shelf);
}

for(let i=0;i<300;i++){
const book = new THREE.Mesh(
new THREE.BoxGeometry(.25,1.2+Math.random()*1.4,.95),
new THREE.MeshStandardMaterial({
color:new THREE.Color().setHSL(.05+Math.random()*.05,.45,.18+Math.random()*.2),
roughness:.88
})
);
book.position.set(-3.8+Math.random()*7.6,1.2+Math.floor(i/28)*3.1,0);
book.rotation.z = (Math.random()-.5)*.05;
group.add(book);
}

group.position.set(x,0,z);
group.rotation.y = rot;
room.add(group);
}

for(let z=-42;z<=42;z+=12){
createShelfColumn(-56,z,Math.PI/2);
createShelfColumn(56,z,-Math.PI/2);
}

for(let x=-34;x<=34;x+=12){
createShelfColumn(x,-56,0);
}

// central rug first
const rug = new THREE.Mesh(
new THREE.PlaneGeometry(32,22),
new THREE.MeshStandardMaterial({color:0x3b1d19,roughness:1})
);
rug.rotation.x = -Math.PI/2;
rug.position.y = .012;
rug.position.z = 17;
room.add(rug);

// main desk made more solid and authored
box(20,1.5,10,0,.75,14,woodMid);
box(4,5.5,4.5,-7,2.75,14,woodDark);
box(4,5.5,4.5,7,2.75,14,woodDark);
box(20,.25,.5,0,1.65,9.1,new THREE.MeshStandardMaterial({color:0x1b100a,roughness:.9}));
box(20,.25,.5,0,1.65,18.9,new THREE.MeshStandardMaterial({color:0x1b100a,roughness:.9}));

// chair slightly off-centre
box(3.4,3.1,3.4,1.2,1.55,25,new THREE.MeshStandardMaterial({color:0x1f130d,roughness:.95}),.25);
box(3.2,4.5,.5,1.2,4.4,26.2,new THREE.MeshStandardMaterial({color:0x1a0f0a,roughness:.95}),.25);

// typewriter
box(3.4,.9,2.4,0,1.85,13,new THREE.MeshStandardMaterial({color:0x111111,roughness:.7}));
box(2.5,.12,1.2,0,2.35,12.1,paperMat);

// papers/books on desk
for(let i=0;i<22;i++){
box(
1+Math.random()*1.6,
.08+.12*Math.random(),
1+Math.random()*1.5,
-8+Math.random()*16,
1.55+Math.random()*.7,
10+Math.random()*8,
paperMat,
(Math.random()-.5)*.5
);
}

// side desks moved to edges
function sideDesk(x,z,rot=0){
box(11,1.1,4,x,.55,z,woodMid,rot);
for(let i=0;i<7;i++){
box(1.2,.8+Math.random()*1,1,x-3+Math.random()*6,1.5,z-1+Math.random()*2,
new THREE.MeshStandardMaterial({color:0x222222,roughness:.8}));
}
}

sideDesk(-44,6);
sideDesk(44,8);
sideDesk(-44,30);
sideDesk(44,32);

// investigation wall, clearer and less random
const board = new THREE.Mesh(
new THREE.PlaneGeometry(22,17),
new THREE.MeshStandardMaterial({color:0x1c140f,roughness:1})
);
board.position.set(-50,18,0);
board.rotation.y = Math.PI/2;
room.add(board);

for(let i=0;i<55;i++){
const note = new THREE.Mesh(
new THREE.PlaneGeometry(.8+Math.random()*1.4,.8+Math.random()*1.2),
new THREE.MeshBasicMaterial({color:0xd8c3a2})
);
note.position.set(-49.4,10+Math.random()*14,-7+Math.random()*14);
note.rotation.y = Math.PI/2;
note.rotation.z = (Math.random()-.5)*.35;
room.add(note);
}

// lighting
scene.add(new THREE.AmbientLight(0x705438,.45));

const moon = new THREE.SpotLight(0xc3dcff,130,280,.5,.45,1);
moon.position.set(0,36,-30);
moon.target.position.set(0,8,0);
scene.add(moon.target);
scene.add(moon);

function deskLamp(x,y,z,intensity=55){
const light = new THREE.PointLight(0xffc27a,intensity,72,1.5);
light.position.set(x,y,z);
light.castShadow = true;
room.add(light);
const glow = new THREE.Mesh(
new THREE.SphereGeometry(.22,16,16),
new THREE.MeshBasicMaterial({color:0xffd39f})
);
glow.position.copy(light.position);
room.add(glow);
}

deskLamp(0,5.2,14,68);
deskLamp(-42,4,6,45);
deskLamp(42,4,8,45);
deskLamp(-42,4,30,42);
deskLamp(42,4,32,42);

// dust
const dustGeo = new THREE.BufferGeometry();
const dustCount = 2400;
const positions = new Float32Array(dustCount*3);

for(let i=0;i<dustCount*3;i++){
positions[i] = (Math.random()-.5)*120;
}

dustGeo.setAttribute('position',new THREE.BufferAttribute(positions,3));

const dust = new THREE.Points(
dustGeo,
new THREE.PointsMaterial({color:0xffddb0,size:.045,transparent:true,opacity:.18})
);
scene.add(dust);

// movement
let yaw = 0;
const keys = {};

window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

function move(){
const speed = .32; // slightly faster than V6

const forward = new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));

if(keys['ArrowUp']){
camera.position.add(forward.clone().multiplyScalar(-speed));
}

if(keys['ArrowDown']){
camera.position.add(forward.clone().multiplyScalar(speed));
}

if(keys['ArrowLeft']) yaw += .04;
if(keys['ArrowRight']) yaw -= .04;

camera.position.x = Math.max(-54,Math.min(54,camera.position.x));
camera.position.z = Math.max(-54,Math.min(54,camera.position.z));
camera.position.y = 4.7;

camera.rotation.order='YXZ';
camera.rotation.y = yaw;
camera.rotation.x = 0;
}

function animate(){
requestAnimationFrame(animate);
move();
dust.rotation.y += .00003;
renderer.render(scene,camera);
}

animate();

window.addEventListener('resize',()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
