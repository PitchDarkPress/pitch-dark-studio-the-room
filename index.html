<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pitch Dark Studios — V8 Bold Visual Pass</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Georgia,serif;
}
canvas{display:block}
#overlay{
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at center, transparent 62%, rgba(0,0,0,.45) 100%),
linear-gradient(to bottom, rgba(0,0,0,.02), rgba(0,0,0,.34));
z-index:5;
}
#ui{
position:fixed;
left:28px;
bottom:24px;
color:#d0a060;
font-size:12px;
letter-spacing:2px;
line-height:1.8;
opacity:.72;
z-index:10;
}
</style>
</head>

<body>

<div id="ui">
↑ — FORWARD<br>
↓ — BACKWARD<br>
← — LOOK LEFT<br>
→ — LOOK RIGHT
</div>

<div id="overlay"></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x060504,0.0018);

const camera = new THREE.PerspectiveCamera(
55,
window.innerWidth/window.innerHeight,
0.1,
2000
);

camera.position.set(0,5.2,42);

const renderer = new THREE.WebGLRenderer({
antialias:true,
powerPreference:'high-performance'
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

document.body.appendChild(renderer.domElement);

const room = new THREE.Group();
scene.add(room);

const matWall = new THREE.MeshStandardMaterial({color:0x130d0a,roughness:1});
const matFloor = new THREE.MeshStandardMaterial({color:0x3b2518,roughness:.9});
const matWoodDark = new THREE.MeshStandardMaterial({color:0x20130c,roughness:.9});
const matWood = new THREE.MeshStandardMaterial({color:0x4a2d1b,roughness:.82});
const matPaper = new THREE.MeshStandardMaterial({color:0xd4c0a2,roughness:1});
const matBlack = new THREE.MeshStandardMaterial({color:0x090909,roughness:.7});

function box(w,h,d,x,y,z,mat=matWoodDark,ry=0){
const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
mesh.position.set(x,y,z);
mesh.rotation.y = ry;
mesh.castShadow = true;
mesh.receiveShadow = true;
room.add(mesh);
return mesh;
}

// BIG ROOM SHELL
const floor = new THREE.Mesh(new THREE.PlaneGeometry(120,120),matFloor);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
room.add(floor);

box(120,46,1,0,23,-60,matWall);
box(120,46,1,0,23,60,matWall);
box(1,46,120,-60,23,0,matWall);
box(1,46,120,60,23,0,matWall);

const ceiling = new THREE.Mesh(
new THREE.PlaneGeometry(120,120),
new THREE.MeshStandardMaterial({color:0x070605,roughness:1})
);
ceiling.rotation.x = Math.PI/2;
ceiling.position.y = 46;
room.add(ceiling);

// FLOOR PLANKS - MUCH CLEARER
for(let x=-58;x<=58;x+=2){
box(.045,.025,120,x,.02,0,new THREE.MeshBasicMaterial({color:0x1b120d}));
}
for(let z=-58;z<=58;z+=8){
box(120,.026,.045,0,.025,z,new THREE.MeshBasicMaterial({color:0x21140d}));
}

// HUGE BRIGHT GOTHIC WINDOW — FIRST THING YOU SEE
const glass = new THREE.Mesh(
new THREE.PlaneGeometry(26,36),
new THREE.MeshBasicMaterial({
color:0xaec8dd,
transparent:true,
opacity:.42
})
);
glass.position.set(0,23,-59.25);
room.add(glass);

box(30,2,.8,0,5,-58.9,matBlack);
box(30,2,.8,0,41,-58.9,matBlack);
box(2,36,.8,-15,23,-58.9,matBlack);
box(2,36,.8,15,23,-58.9,matBlack);

for(let x=-10;x<=10;x+=5){
box(.22,36,.45,x,23,-58.65,matBlack);
}
for(let y=10;y<=36;y+=6){
box(28,.22,.45,0,y,-58.65,matBlack);
}

// pointed top impression
const archTop = new THREE.Mesh(
new THREE.ConeGeometry(15.4,12,4),
matBlack
);
archTop.position.set(0,47,-58.9);
archTop.rotation.z = Math.PI/4;
room.add(archTop);

// MOON PLANE OUTSIDE WINDOW
const moonPanel = new THREE.Mesh(
new THREE.PlaneGeometry(48,48),
new THREE.MeshBasicMaterial({
color:0x8ba9c7,
transparent:true,
opacity:.10
})
);
moonPanel.position.set(0,24,-60.4);
room.add(moonPanel);

// RAIN ON WINDOW
for(let i=0;i<260;i++){
const rain = new THREE.Mesh(
new THREE.PlaneGeometry(.035,1.2),
new THREE.MeshBasicMaterial({
color:0xd7e8ff,
transparent:true,
opacity:.22
})
);
rain.position.set(-12+Math.random()*24,7+Math.random()*33,-58.2);
rain.rotation.z = -.12;
room.add(rain);
}

// TOWERING SHELVES
function shelfTower(x,z,rot=0){
const group = new THREE.Group();

const back = new THREE.Mesh(new THREE.BoxGeometry(10,38,2.0),matWoodDark);
back.position.y = 19;
group.add(back);

for(let y=2;y<37;y+=3.1){
const plank = new THREE.Mesh(
new THREE.BoxGeometry(10.2,.18,2.15),
new THREE.MeshStandardMaterial({color:0x160d08,roughness:.95})
);
plank.position.y = y;
group.add(plank);
}

for(let i=0;i<380;i++){
const book = new THREE.Mesh(
new THREE.BoxGeometry(.28,1.3+Math.random()*1.4,1.05),
new THREE.MeshStandardMaterial({
color:new THREE.Color().setHSL(
.04+Math.random()*.06,
.48,
.16+Math.random()*.23
),
roughness:.88
})
);
book.position.set(-4.2+Math.random()*8.4,1.25+Math.floor(i/30)*3.1,.05);
book.rotation.z = (Math.random()-.5)*.07;
group.add(book);
}

// vertical brass rail
const railMat = new THREE.MeshBasicMaterial({color:0x8a6a37});
for(let r of [-5.1,5.1]){
const rail = new THREE.Mesh(new THREE.BoxGeometry(.12,38,.12),railMat);
rail.position.set(r,19,1.15);
group.add(rail);
}

group.position.set(x,0,z);
group.rotation.y = rot;
room.add(group);
}

for(let z=-42;z<=42;z+=12){
shelfTower(-56,z,Math.PI/2);
shelfTower(56,z,-Math.PI/2);
}

for(let x=-36;x<=36;x+=12){
shelfTower(x,-56,0);
}

// GIANT CENTRAL RUG
const rug = new THREE.Mesh(
new THREE.PlaneGeometry(38,26),
new THREE.MeshStandardMaterial({color:0x3b1918,roughness:1})
);
rug.rotation.x = -Math.PI/2;
rug.position.y = .012;
rug.position.z = 17;
room.add(rug);

// HUGE AUTHOR'S DESK — MUCH CLOSER / MORE DOMINANT
box(24,1.8,12,0,.9,15,matWood);
box(5,6,5,-8.5,3,15,matWoodDark);
box(5,6,5,8.5,3,15,matWoodDark);
box(24,.3,.6,0,2.0,9.1,new THREE.MeshStandardMaterial({color:0x160d08,roughness:.9}));
box(24,.3,.6,0,2.0,20.9,new THREE.MeshStandardMaterial({color:0x160d08,roughness:.9}));

// CHAIR
box(4.2,3.4,4.2,1.5,1.7,25,matWoodDark,.24);
box(4,5,.55,1.5,4.5,26.8,matWoodDark,.24);

// TYPEWRITER + PAPER
box(4.2,1.1,2.9,0,2.15,13,matBlack);
box(3.2,.14,1.5,0,2.85,11.8,matPaper);

// OBVIOUS PAPER CHAOS
for(let i=0;i<44;i++){
box(
1+Math.random()*2.2,
.07+.1*Math.random(),
1+Math.random()*1.8,
-10+Math.random()*20,
2.0+Math.random()*.65,
10+Math.random()*10,
matPaper,
(Math.random()-.5)*1.0
);
}

// PILES OF BOOKS ON FLOOR AND DESK
function bookPile(x,z,count=8){
for(let i=0;i<count;i++){
box(
2.2+Math.random()*.8,
.25,
1.4+Math.random()*.5,
x+(Math.random()-.5)*.6,
.18+i*.25,
z+(Math.random()-.5)*.6,
new THREE.MeshStandardMaterial({
color:new THREE.Color().setHSL(.05+Math.random()*.06,.48,.18+Math.random()*.18),
roughness:.85
}),
(Math.random()-.5)*.4
);
}
}
bookPile(-12,8,9);
bookPile(13,10,7);
bookPile(-14,25,10);
bookPile(14,27,8);
bookPile(-5,18,5);
bookPile(7,12,5);

// INVESTIGATION / EMPIRE WALL — HUGE AND VISIBLE TO LEFT
const board = new THREE.Mesh(
new THREE.PlaneGeometry(28,20),
new THREE.MeshStandardMaterial({color:0x21160f,roughness:1})
);
board.position.set(-58.8,21,2);
board.rotation.y = Math.PI/2;
room.add(board);

for(let i=0;i<90;i++){
const note = new THREE.Mesh(
new THREE.PlaneGeometry(.9+Math.random()*1.7,.7+Math.random()*1.4),
new THREE.MeshBasicMaterial({color: i%6===0 ? 0x9a6d4a : 0xd8c3a2})
);
note.position.set(-58.25,11+Math.random()*18,-10+Math.random()*22);
note.rotation.y = Math.PI/2;
note.rotation.z = (Math.random()-.5)*.55;
room.add(note);
}

// SIGNAL / BROADCAST STACKS RIGHT
for(let i=0;i<4;i++){
box(4,3.2,3,49,1.6+i*3.3,-8,matBlack);
box(2.6,.12,.18,49,2+i*3.3,-6.45,new THREE.MeshBasicMaterial({color:0xff6a2a}));
}

// SIDE TABLES WITH LAMPS
function sideDesk(x,z){
box(12,1.2,4.5,x,.6,z,matWood);
for(let i=0;i<9;i++){
box(1.2,.7+Math.random()*1.2,1,x-4+Math.random()*8,1.5,z-1.5+Math.random()*3,
new THREE.MeshStandardMaterial({color:0x222222,roughness:.8}));
}
}
sideDesk(-43,10);
sideDesk(43,12);
sideDesk(-43,33);
sideDesk(43,35);

// LIGHTING — BOLDER
scene.add(new THREE.AmbientLight(0x80603d,.50));

const moon = new THREE.SpotLight(0xd3e8ff,190,320,.55,.45,1);
moon.position.set(0,42,-35);
moon.target.position.set(0,8,6);
scene.add(moon.target);
scene.add(moon);

function lamp(x,y,z,intensity=70,dist=85){
const light = new THREE.PointLight(0xffc27a,intensity,dist,1.4);
light.position.set(x,y,z);
light.castShadow = true;
room.add(light);
const glow = new THREE.Mesh(new THREE.SphereGeometry(.32,20,20),new THREE.MeshBasicMaterial({color:0xffd39f}));
glow.position.copy(light.position);
room.add(glow);
}

lamp(0,6.2,15,100,100);
lamp(-43,5,10,58,70);
lamp(43,5,12,58,70);
lamp(-43,5,33,50,70);
lamp(43,5,35,50,70);

// DUST
const dustGeo = new THREE.BufferGeometry();
const dustCount = 2600;
const positions = new Float32Array(dustCount*3);
for(let i=0;i<dustCount*3;i++){
positions[i] = (Math.random()-.5)*120;
}
dustGeo.setAttribute('position',new THREE.BufferAttribute(positions,3));

const dust = new THREE.Points(
dustGeo,
new THREE.PointsMaterial({
color:0xffddb0,
size:.045,
transparent:true,
opacity:.18
})
);
scene.add(dust);

// MOVEMENT
let yaw = 0;
const keys = {};
window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

function move(){
const speed = .16;
const forward = new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));

if(keys['ArrowUp']) camera.position.add(forward.clone().multiplyScalar(-speed));
if(keys['ArrowDown']) camera.position.add(forward.clone().multiplyScalar(speed));
if(keys['ArrowLeft']) yaw += .022;
if(keys['ArrowRight']) yaw -= .022;

camera.position.x = Math.max(-54,Math.min(54,camera.position.x));
camera.position.z = Math.max(-54,Math.min(54,camera.position.z));
camera.position.y = 5.2;

camera.rotation.order='YXZ';
camera.rotation.y = yaw;
camera.rotation.x = 0;
}

function animate(){
requestAnimationFrame(animate);
move();
dust.rotation.y += .00003;
renderer.render(scene,camera);
}

animate();

window.addEventListener('resize',()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
});
</script>
</body>
</html>
